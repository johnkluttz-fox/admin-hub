<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Fox Pest Control Admin Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1628;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;font-size:15px;}
input,textarea,select,button{font-family:inherit;}
.btn{cursor:pointer;border:none;border-radius:8px;font-weight:600;transition:all .15s;padding:10px 18px;font-size:14px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.97);}
.bp{background:#2563eb;color:#fff;} .bp:hover{background:#1d4ed8;}
.bg{background:transparent;color:#94a3b8;border:1px solid #1e3a5f;} .bg:hover{border-color:#3b82f6;color:#e2e8f0;}
.bs{background:#16a34a;color:#fff;} .bs:hover{background:#15803d;}
.bd{background:#dc2626;color:#fff;padding:6px 12px;font-size:12px;} .bd:hover{background:#b91c1c;}
.card{background:#0f1f38;border-radius:12px;border:1px solid #1e3a5f;padding:16px;}
.inp{background:#0a1628;color:#e2e8f0;border:1px solid #1e3a5f;border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;}
.inp:focus{border-color:#3b82f6;}
#hdr{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:0 16px;position:sticky;top:0;z-index:50;}
#hdr-in{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;}
#nav{display:flex;gap:2px;}
.nb{display:flex;align-items:center;gap:4px;padding:6px 9px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#64748b;}
.nb.on{background:#1e3a5f;color:#93c5fd;}
.bdg{background:#ef4444;color:#fff;border-radius:50%;width:15px;height:15px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;}
#wrap{max-width:760px;margin:0 auto;padding:20px 14px;}
.pg{display:none;} .pg.on{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sc{background:#0f1f38;border-radius:12px;border:1px solid #1e3a5f;padding:16px;}
.al-o{background:#431407;border:1px solid #c2410c;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer;}
.al-a{background:#1c1100;border:1px solid #92400e;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer;}
.sbdg{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.pb{height:3px;background:#0f1f38;border-radius:2px;margin-bottom:16px;}
.pf{height:100%;background:#2563eb;border-radius:2px;transition:width .3s;}
.skb{width:34px;height:34px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-weight:700;font-size:13px;background:#0a1628;color:#64748b;}
.skb.on{color:#fff;}
.fb{padding:5px 12px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#64748b;}
.fb.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;}
.stb{padding:6px 12px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:#64748b;}
.stb.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.pd{width:14px;height:14px;border-radius:50%;background:#1e3a5f;transition:background .15s;display:inline-block;}
.pd.on{background:#3b82f6;}
.pk{background:#162235;color:#e2e8f0;border:1px solid #1e3a5f;border-radius:10px;padding:16px 0;font-size:20px;font-weight:600;cursor:pointer;width:100%;text-align:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;}
.pk:active{background:#1e3a5f;}
.pk.del{background:#1e293b;color:#94a3b8;font-size:14px;}
.tag-low{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#431407;color:#fb923c;}

<body>

<div id="login">
  <div id="logo-login" style="height:80px;width:200px;margin-bottom:32px;"></div>
  <div style="background:#0f1f38;border-radius:16px;padding:32px;width:100%;max-width:340px;border:1px solid #1e3a5f;">
    <h2 style="text-align:center;font-size:18px;font-weight:600;margin-bottom:8px;">Admin Hub</h2>
    <p style="text-align:center;color:#64748b;font-size:13px;margin-bottom:20px;">Fox Pest Control - Willamette Valley</p>

    <!-- Step 1: Email -->
    <div id="login-step-email">
      <label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Your Email</label>
      <input type="email" id="login-email" class="inp" placeholder="yourname@fox-marketingservices.com" style="margin-bottom:12px;">
      <div id="email-err" style="text-align:center;color:#ef4444;font-size:13px;margin-bottom:12px;min-height:20px;"></div>
      <button class="btn bp" id="email-next-btn" style="width:100%;padding:12px;font-size:15px;">Continue</button>
    </div>

    <!-- Step 2: Role Selection -->
    <div id="login-step-role" style="display:none;">
      <div id="login-role-email" style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:20px;"></div>
      <p style="text-align:center;color:#e2e8f0;font-size:15px;font-weight:600;margin-bottom:16px;">How are you logging in today?</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn bp" id="role-admin-btn" style="padding:16px;font-size:15px;border-radius:10px;">Administrator</button>
        <button class="btn bg" id="role-tech-btn" style="padding:16px;font-size:15px;border-radius:10px;">Technician</button>
      </div>
      <button style="background:transparent;border:none;color:#64748b;font-size:12px;cursor:pointer;margin-top:16px;width:100%;text-align:center;" id="back-from-role-btn">Use a different email</button>
    </div>

    <!-- Step 3: PIN -->
    <div id="login-step-pin" style="display:none;">
      <div id="login-email-display" style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:4px;"></div>
      <div id="login-role-display" style="text-align:center;color:#3b82f6;font-size:12px;font-weight:600;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em;"></div>
      <div style="display:flex;justify-content:center;gap:10px;margin-bottom:20px;" id="dots">
        <span class="pd" id="d0"></span><span class="pd" id="d1"></span><span class="pd" id="d2"></span><span class="pd" id="d3"></span>
      </div>
      <div id="debug" style="text-align:center;color:#64748b;font-size:12px;margin-bottom:4px;"></div>
      <div id="pin-err" style="text-align:center;color:#ef4444;font-size:13px;margin-bottom:12px;min-height:20px;"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;" id="pinpad">
        <button class="pk" id="pk1">1</button>
        <button class="pk" id="pk2">2</button>
        <button class="pk" id="pk3">3</button>
        <button class="pk" id="pk4">4</button>
        <button class="pk" id="pk5">5</button>
        <button class="pk" id="pk6">6</button>
        <button class="pk" id="pk7">7</button>
        <button class="pk" id="pk8">8</button>
        <button class="pk" id="pk9">9</button>
        <div></div>
        <button class="pk" id="pk0">0</button>
        <button class="pk del" id="pkdel">&larr;</button>
      </div>
      <button style="background:transparent;border:none;color:#64748b;font-size:12px;cursor:pointer;margin-top:12px;width:100%;text-align:center;" id="back-to-email-btn">Use a different email</button>
    </div>
  </div>
  <p style="color:#334155;font-size:12px;margin-top:24px;">Fox Pest Control - Willamette Valley Branch</p>
</div>

<div id="app" style="display:none;">
  <div id="hdr"><div id="hdr-in">
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="logo-app" style="height:30px;width:80px;"></div>
      <span id="sync-badge" style="font-size:10px;padding:2px 7px;border-radius:10px;display:none;"></span>
    </div>
    <div id="nav"></div>
    <button class="nb" id="logout-btn">Exit</button>
  </div></div>
  <div id="wrap">
    <div id="pg-dashboard" class="pg"></div>
    <div id="pg-inspect" class="pg"></div>
    <div id="pg-inventory" class="pg"></div>
    <div id="pg-orders" class="pg"></div>
    <div id="pg-checkout" class="pg"></div>
    <div id="pg-truckinv" class="pg"></div>
    <div id="pg-settings" class="pg"></div>
  </div>
</div>


<script>
// ─── Data ────────────────────────────────────────────────────────────────────

const BRIDGE = "https://script.google.com/macros/s/AKfycbzX1SVGdraGV6GpjQfwZguWx1IDXQ-OkHqeU-W0C5q9pvojRFY0OgYY-cZ96bFwDUNN/exec";

// JSONP for GET requests (bypasses CORS)
function jsonpGet(action) {
  return new Promise(function(res, rej){
    var cb = "cb_" + Math.random().toString(36).slice(2);
    var script = document.createElement("script");
    var timer = setTimeout(function(){
      delete window[cb];
      if(script.parentNode) script.parentNode.removeChild(script);
      rej(new Error("Timeout"));
    }, 15000);
    window[cb] = function(data){
      clearTimeout(timer);
      delete window[cb];
      if(script.parentNode) script.parentNode.removeChild(script);
      if(data.error) rej(new Error(data.error));
      else res(data);
    };
    script.src = BRIDGE + "?action=" + action + "&callback=" + cb;
    script.onerror = function(){ clearTimeout(timer); rej(new Error("Script error")); };
    document.head.appendChild(script);
  });
}

// POST for write requests
function jsonPost(action, data){
  return fetch(BRIDGE, {
    method: "POST",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({action: action, data: data})
  }).then(function(r){ return r.json(); });
}

function gs(fn, data){
  var action = fn.replace("Server","");
  if(data === null || data === undefined){
    return jsonpGet(action);
  } else {
    return jsonPost(action, data);
  }
}

    }
    // Re-render if currently on settings page so truck assignments show correctly
    if(S.role && S.tab === "settings"){
      renderSettings();
    }
  } catch(e){ console.warn("Load accounts:", e.message); }
}

async function saveAccountsToSheet(){
  try {
    await gs("saveAccountsServer", {managers: S.managers, techAccounts: S.techAccounts});
  } catch(e){ console.warn("Save accounts:", e.message); }
}

async function syncFromSheet(){
  badge("syncing");
  try {
    const [pr,tc] = await Promise.all([gs("getProductsServer",null),gs("getTechsServer",null)]);
    if(pr&&pr.products&&pr.products.length){S.products=pr.products;lsSet("hub:products",pr.products);}
    if(tc&&tc.techs&&tc.techs.length){
      S.techs=tc.techs.map(t=>t.name);
      S.techEmails=tc.techs;
      lsSet("hub:techs",S.techs);
      lsSet("hub:techEmails",S.techEmails);
      // Merge sheet techs into techAccounts - add new ones, preserve PINs
      tc.techs.forEach(function(t){
        var existing = S.techAccounts.find(function(a){ return a.name===t.name; });
        if(!existing){
          S.techAccounts.push({
            id:"tech_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
            name:t.name, email:t.email,
            pin:"", tempPin:"0000", isTemp:true
          });
        } else {
          existing.email = t.email; // Update email in case it changed
        }
      });
      lsSet("hub:techAccounts",S.techAccounts);
    }
    badge("done");
  } catch(e){ console.warn("Sync:",e.message); badge("err"); }
  render();
}

function badge(s){
  const b=document.getElementById("sync-badge");
  if(!b)return;
  b.style.display="inline";
  if(s==="syncing"){b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#0d1f3c;color:#3b82f6;border:1px solid #1e3a5f;";b.textContent="Syncing";}
  else if(s==="done"){b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#052e16;color:#22c55e;border:1px solid #166534;";b.textContent="Synced";setTimeout(()=>b.style.display="none",3000);}
  else{b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#1c0a00;color:#f97316;border:1px solid #7c2d12;";b.textContent="Offline";}
}

function uid(){return Math.random().toString(36).slice(2,9);}
function fd(iso){return new Date(iso).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});}
function sc(p){return p>=90?"#22c55e":p>=75?"#84cc16":p>=60?"#f59e0b":p>=40?"#f97316":"#ef4444";}
function sl(p){return p>=90?"Excellent":p>=75?"Good":p>=60?"Fair":p>=40?"Poor":"Failing";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ring(pct,sz){sz=sz||80;const r=(sz-10)/2,c=2*Math.PI*r,o=c-(pct/100)*c,col=sc(pct);
  return '<svg width="'+sz+'" height="'+sz+'" style="display:block;margin:0 auto"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="8"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" stroke-linecap="round" transform="rotate(-90 '+sz/2+' '+sz/2+')"/><text x="'+sz/2+'" y="'+(sz/2+5)+'" text-anchor="middle" fill="'+col+'" font-size="'+(sz/4)+'" font-weight="700" font-family="monospace">'+pct+'%</text></svg>';}

let pin="";
// Store email and role entered at login
var loginEmail = "";
var loginRole = ""; // "manager" or "tech" - set at role selection step

function showPinStep(){
  document.getElementById("login-step-email").style.display="none";
  document.getElementById("login-step-role").style.display="none";
  document.getElementById("login-step-pin").style.display="block";
  var disp = document.getElementById("login-email-display");
  if(disp) disp.textContent = loginEmail;
  var roleDisp = document.getElementById("login-role-display");
  if(roleDisp) roleDisp.textContent = loginRole==="manager" ? "Administrator" : "Technician";
  pin=""; dots();
}

function showRoleStep(){
  document.getElementById("login-step-email").style.display="none";
  document.getElementById("login-step-pin").style.display="none";
  document.getElementById("login-step-role").style.display="block";
  var disp = document.getElementById("login-role-email");
  if(disp) disp.textContent = loginEmail;
}

function showEmailStep(){
  document.getElementById("login-step-pin").style.display="none";
  document.getElementById("login-step-role").style.display="none";
  document.getElementById("login-step-email").style.display="block";
  loginEmail=""; loginRole="";
  pin=""; dots();
  var err=document.getElementById("email-err");
  if(err) err.textContent="";
}

function selectRole(role){
  loginRole = role;
  // Set currentUser based on chosen role
  var email = loginEmail;
  if(role==="manager"){
    S.currentUser = S.managers.find(function(m){ return m.email.toLowerCase()===email; });
  } else {
    // For tech role, check tech accounts first, then manager accounts
    S.currentUser = S.techAccounts.find(function(t){ return t.email.toLowerCase()===email; });
    if(!S.currentUser) S.currentUser = S.managers.find(function(m){ return m.email.toLowerCase()===email; });
  }
  showPinStep();
}

function checkEmail(){
  var inp = document.getElementById("login-email");
  var email = (inp?inp.value:"").trim().toLowerCase();
  var err = document.getElementById("email-err");
  if(!email){ if(err) err.textContent="Please enter your email."; return; }
  
  var isMgr = S.managers.find(function(m){ return m.email.toLowerCase()===email; });
  var isTech = S.techAccounts.find(function(t){ return t.email.toLowerCase()===email; });
  
  if(!isMgr && !isTech){
    if(err) err.textContent="Email not found. Please check and try again.";
    return;
  }
  
  loginEmail = email;
  
  // If email matches BOTH manager and tech accounts - show role selection
  if(isMgr && isTech){
    showRoleStep();
    return;
  }
  
  // If only manager - go straight to PIN as admin
  if(isMgr){
    loginRole="manager";
    S.currentUser=isMgr;
    showPinStep();
    return;
  }
  
  // If only tech - go straight to PIN as tech
  loginRole="tech";
  S.currentUser=isTech;
  showPinStep();
}

function pinTap(k){
  const err=document.getElementById("pin-err");
  if(k==="del"){pin=pin.slice(0,-1);dots();if(err)err.textContent="";return;}
  if(pin.length>=6)return;
  pin+=k; dots();
  if(pin.length>=4){
    if(!S.currentUser){ if(err) err.textContent="Please enter your email first."; pin=""; dots(); return; }
    var user = S.currentUser;
    var correctPin = user.isTemp ? user.tempPin : user.pin;
    if(pin === correctPin){
      var role = loginRole || (S.managers.find(function(m){ return m.id===user.id; }) ? "manager" : "tech");
      if(user.isTemp){ setTimeout(function(){ doLogin(role,true); },200); }
      else { setTimeout(function(){ login(role); },200); }
    } else if(pin.length>=4){
      if(err) err.textContent="Incorrect PIN";
      pin=""; dots();
    }
  }
}

function doLogin(role, isTemp){
  if(isTemp){
    // Show set PIN screen
    S.role=role;
    S._settingPin=true;
    showSetPin();
  } else {
    login(role);
  }
}

function dots(){for(let i=0;i<4;i++){const d=document.getElementById("d"+i);if(d)d.className="pd"+(pin.length>i?" on":"");}}
var _refreshInterval = null;

function login(role){
  S.role=role;
  S.tab=role==="tech"?"checkout":"dashboard";
  if(S.currentUser) S.managerName=S.currentUser.name;
  if(role==="tech" && S.currentUser) S.checkTech=S.currentUser.name;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  syncFromSheet();
  saveAccountsToSheet();
  // Start background order refresh every 2 minutes (managers only)
  if(role==="manager"){
    if(_refreshInterval) clearInterval(_refreshInterval);
    _refreshInterval = setInterval(async function(){
      try {
        const result = await gs("getPendingServer", null);
        if(result && result.orders){
          S.orders = result.orders;
          lsSet("hub:orders", S.orders);
          // Update nav badge and dashboard without full re-render
          var pending = S.orders.filter(function(o){ return o.status==="Pending"; }).length;
          // Re-render nav to update badge
          var mgrTabs=[{id:"dashboard",l:"Home"},{id:"inspect",l:"Fleet"},{id:"inventory",l:"Inventory"},{id:"orders",l:"Orders"},{id:"checkout",l:"Checkout"},{id:"truckinv",l:"Truck Inv"},{id:"settings",l:"Settings"}];
          document.getElementById("nav").innerHTML=mgrTabs.map(function(t){
            return "<button class='nb"+(S.tab===t.id?" on":"")+"' data-a='tab' data-v='"+t.id+"'>"+t.l+(t.id==="orders"&&pending>0?"<span class='bdg'>"+pending+"</span>":"")+"</button>";
          }).join("")+"<button class='nb' id='logout-btn' style='color:#475569;'>Exit</button>";
          // Re-attach logout
          var lo=document.getElementById("logout-btn");
          if(lo){ lo.onclick=function(){logout();}; lo.addEventListener("touchend",function(e){e.preventDefault();logout();},{passive:false}); }
          // If on dashboard, refresh it to show alert
          if(S.tab==="dashboard") renderDash();
          // If on orders, refresh it too
          if(S.tab==="orders") renderOrders();
        }
      } catch(e){ console.warn("Background refresh:", e.message); }
    }, 2 * 60 * 1000); // every 2 minutes
  }
}
function logout(){
  S.role=null; S.currentUser=null; S.checkTech=""; pin=""; loginEmail=""; loginRole="";
  if(_refreshInterval){ clearInterval(_refreshInterval); _refreshInterval=null; }
  document.getElementById("app").style.display="none";
  var loginDiv = document.getElementById("login");
  loginDiv.style.display="flex";
  var pk1 = document.getElementById("pk1");
  if(!pk1){ location.reload(); return; }
  showEmailStep();
}

document.addEventListener("change",function(e){
  const t=e.target;
  if(t.id==="check-tech") S.checkTech=t.value;
  if(t.dataset.field&&t.dataset.idx!==undefined){
    const idx=parseInt(t.dataset.idx);
    if(S.checkItems[idx]!==undefined) S.checkItems[idx][t.dataset.field]=t.value;
  }
  if(t.id==="insp-truck") S.inspData.truck=t.value;
  if(t.id==="insp-filter"){S.inspListFilter=t.value;render();}
  // Truck assignment dropdown
  if(t.getAttribute && t.getAttribute("data-a")==="assign-truck"){
    var idx = parseInt(t.getAttribute("data-v"));
    assignTruck(idx, t.value);
  }
  // Show/hide "Other" reason text input
  if(t.id && t.id.startsWith("adj-reason-") && !t.id.includes("other")){
    const pid = t.id.replace("adj-reason-","");
    const otherInp = document.getElementById("adj-reason-other-"+pid);
    if(otherInp) otherInp.style.display = t.value==="Other" ? "block" : "none";
  }
  if(t.dataset.prodid&&t.dataset.prodfield){
    const p=S.products.find(x=>x.id===t.dataset.prodid);
    if(p){
      p[t.dataset.prodfield]=t.dataset.prodfield==="unit"?t.value:(parseInt(t.value)||0);
      save();
      // Write qty and lowAt changes back to sheet
      if(t.dataset.prodfield==="qty"||t.dataset.prodfield==="lowAt"){
        clearTimeout(window._prodSaveTimer);
        window._prodSaveTimer = setTimeout(async function(){
          if(p.row){
            try {
              if(t.dataset.prodfield==="qty") await gs("updateQtyServer",{row:p.row,qty:p.qty});
              if(t.dataset.prodfield==="lowAt") await gs("updateLowAtServer",{row:p.row,lowAt:p.lowAt});
            } catch(e){ console.warn("Product save:",e); }
          }
        }, 1000);
      }
    }
  }
  if(t.id==="mgr-name-inp") S.managerName=t.value;
  if(t.id==="pin-mgr-inp") S._pinMgr=t.value;
  if(t.id==="pin-tech-inp") S._pinTech=t.value;
  if(t.dataset.catid&&t.dataset.catfield){
    const c=S.cats.find(x=>x.id===t.dataset.catid);
    if(c){c[t.dataset.catfield]=t.dataset.catfield==="scale"?parseInt(t.value):t.value;}
    save(); render();
  }
  if(t.dataset.catid&&t.dataset.itemid){
    const c=S.cats.find(x=>x.id===t.dataset.catid);
    if(c){const i=c.items.find(x=>x.id===t.dataset.itemid);if(i)i.label=t.value;save();}
  }
});

function handleAction(a,v,el,e){
  if(a==="pin") { pinTap(v); return; }
  if(a==="logout") { logout(); return; }
  if(a==="tab") { S.tab=v; S.inspView="home"; S.invView="list"; S.checkDone=false; render(); return; }
  if(a==="insp-view") { S.inspView=v; render(); return; }
  if(a==="insp-start") { S.inspView="form"; S.inspStep=0; S.inspData={truck:S.trucks[0]||"",mileage:"",inspector:"",notes:"",scores:{},comments:{},photos:[]}; render(); return; }
  if(a==="insp-next") { S.inspStep++; render(); return; }
  if(a==="insp-back") { if(S.inspStep===0){S.inspView="home";}else{S.inspStep--;} render(); return; }
  if(a==="insp-save") { saveInsp(); return; }
  if(a==="insp-detail") { S.detailInsp=S.inspections.find(r=>r.id===v); S.inspView="detail"; render(); return; }
  if(a==="insp-del") { if(confirm("Delete this inspection?")){S.inspections=S.inspections.filter(r=>r.id!==v);save();} S.inspView="list"; render(); return; }
  if(a==="score") { const [ci,ii,n]=v.split("|"); const k=ci+":"+ii; const cur=S.inspData.scores[k]; if(cur===parseInt(n))delete S.inspData.scores[k]; else S.inspData.scores[k]=parseInt(n); render(); return; }
  if(a==="add-photo") { document.getElementById("photo-file").click(); return; }
  if(a==="del-photo") { S.inspData.photos.splice(parseInt(v),1); render(); return; }
  if(a==="inv-view") { S.invView=v; render(); return; }
  if(a==="open-adj") { S._adjId=v; S._restockId=null; render(); return; }
  if(a==="close-panel") { S._adjId=null; render(); return; }
  if(a==="do-restock") { doRestock(v); return; }
  if(a==="do-adj") { doAdj(v); return; }
  if(a==="sync") { syncFromSheet(); return; }
  if(a==="add-check-item") { S.checkItems.push({id:uid(),productId:"",qty:"",notes:""}); render(); return; }
  if(a==="del-check-item") { S.checkItems.splice(parseInt(v),1); render(); return; }
  if(a==="submit-checkout") { submitCheckout(); return; }
  if(a==="checkout-reset") { S.checkDone=false; S.checkItems=[{id:uid(),productId:"",qty:"",notes:""}]; S.checkTech=""; render(); return; }
  if(a==="order-filter") { S.ordersFilter=v; render(); return; }
  if(a==="refresh-orders") { refreshOrders(); return; }
  if(a==="order-action") { const [id,type]=v.split("|"); S.editOrderId=id; S.editOrderType=type; render(); return; }
  if(a==="order-action-cancel") { S.editOrderId=null; S._itemDecisions={}; render(); return; }
  if(a==="toggle-item-decision") {
    var parts=v.split("|"); var oid=parts[0]; var dec=parts[1];
    if(!S._itemDecisions) S._itemDecisions={};
    S._itemDecisions[oid]=dec;
    renderOrders(); return;
  }
  if(a==="approve-order") { confirmApprove(v); return; }
  if(a==="deny-order") { confirmDeny(v); return; }
  if(a==="settings-tab") { S.settingsTab=v; render(); return; }
  if(a==="save-pins") { savePins(); return; }
  if(a==="add-mgr") { addManager(); return; }
  if(a==="del-mgr") { delManager(parseInt(v)); return; }
  if(a==="reset-mgr-pin") { resetMgrPin(parseInt(v)); return; }
  if(a==="add-tech-account") { addTechAccount(); return; }
  if(a==="del-tech-account") { delTechAccount(parseInt(v)); return; }
  if(a==="reset-tech-pin") { resetTechPin(parseInt(v)); return; }
  if(a==="assign-truck") { assignTruck(parseInt(v), el.value); return; }
  if(a==="send-login-email") { sendLoginEmail("tech", parseInt(v)); return; }
  if(a==="send-mgr-login-email") { sendLoginEmail("manager", parseInt(v)); return; }
  if(a==="ti-add-prod") { tiAddProd(); return; }
  if(a==="inv-show-add") { S._showAddProd=!S._showAddProd; renderInv(); return; }
  if(a==="remove-prod") { removeProd(v); return; }
  if(a==="inv-cancel-add") { S._showAddProd=false; renderInv(); return; }
  if(a==="inv-add-prod") { invAddProduct(); return; }
  if(a==="ti-remove-prod") { tiRemoveProd(v); return; }
  if(a==="ti-submit") { tiSubmit(); return; }
  if(a==="save-mgr-name") { S.managerName=document.getElementById("mgr-name-inp").value||S.managerName; save(); alert("Saved!"); return; }
  if(a==="add-truck") { const inp=document.getElementById("new-truck-inp"); if(inp&&inp.value.trim()){S.trucks.push(inp.value.trim());save();render();} return; }
  if(a==="del-truck") { if(confirm("Remove this truck?")){S.trucks.splice(parseInt(v),1);save();render();} return; }
  if(a==="add-tech") { const inp=document.getElementById("new-tech-inp"); if(inp&&inp.value.trim()){S.techs.push(inp.value.trim());save();render();} return; }
  if(a==="del-tech") { if(confirm("Remove?")){S.techs.splice(parseInt(v),1);save();render();} return; }
  if(a==="toggle-cat") { S.openCat=S.openCat===v?null:v; render(); return; }
  if(a==="add-cat") { const l=prompt("Category name:"); if(!l)return; const sc2=parseInt(prompt("Scale (3,5,10):"))||10; S.cats.push({id:uid(),label:l.trim(),scale:sc2,items:[]}); save(); render(); return; }
  if(a==="del-cat") { if(confirm("Remove category?")){S.cats=S.cats.filter(c=>c.id!==v);save();render();} return; }
  if(a==="add-cat-item") { const l=prompt("Item label:"); if(!l)return; const hc=confirm("Include comment field?"); const c=S.cats.find(x=>x.id===v); if(c){c.items.push({id:uid(),label:l.trim(),hc});save();render();} return; }
  if(a==="del-cat-item") { const [ci,ii]=v.split("|"); const c=S.cats.find(x=>x.id===ci); if(c){c.items=c.items.filter(i=>i.id!==ii);save();render();} return; }
}

  var techTabs=[{id:"checkout",l:"Request"},{id:"truckinv",l:"My Truck"}];
  const tabs=S.role==="manager"?mgrTabs:techTabs;
  const pending=S.orders.filter(o=>o.status==="Pending").length;
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${S.tab===t.id?" on":""}" data-a="tab" data-v="${t.id}">${t.l}${t.id==="orders"&&pending>0?'<span class="bdg">'+pending+'</span>':""}</button>`).join("");
  setPage(S.tab);
  if(S.tab==="dashboard") renderDash();
  else if(S.tab==="inspect") renderInspect();
  else if(S.tab==="inventory") renderInv();
  else if(S.tab==="orders") refreshOrders();
  else if(S.tab==="checkout") renderCheckout();
  else if(S.tab==="truckinv") renderTruckInv();
  else if(S.tab==="settings") renderSettings();
}

function inspForm(){
  const {cats,inspData}=S;
  const steps=["Info",...cats.map(c=>c.label),"Photos & Submit"];
  const step=S.inspStep;
  const isInfo=step===0,isPhotos=step===steps.length-1;
  const cat=!isInfo&&!isPhotos?cats[step-1]:null;
  let pct=calcPct();
  const prog=`<div class="pb"><div class="pf" style="width:${(step/(steps.length-1))*100}%"></div></div><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span style="font-size:12px;color:#475569;">Step ${step+1} of ${steps.length}</span><span style="font-size:12px;color:#475569;">${esc(steps[step])}</span></div>`;
  let body="";
  if(isInfo){
    body=`<h2 style="font-size:17px;font-weight:700;margin-bottom:18px;">Inspection Details</h2>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Vehicle</label>
        <select class="inp" id="insp-truck">${S.trucks.map(t=>`<option value="${esc(t)}"${inspData.truck===t?" selected":""}>${esc(t)}</option>`).join("")}</select></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Current Mileage</label>
        <input type="number" class="inp" id="insp-mileage" value="${esc(inspData.mileage)}" placeholder="e.g. 87432"></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Inspector Name</label>
        <input type="text" class="inp" id="insp-inspector" value="${esc(inspData.inspector)}" placeholder="Your name"></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Notes</label>
        <textarea class="inp" rows="3" id="insp-notes" placeholder="Overall observations...">${esc(inspData.notes)}</textarea></div>`;
  } else if(cat){
    const items=cat.items.map(item=>{
      const key=cat.id+":"+item.id;
      const val=inspData.scores[key];
      const btns=Array.from({length:cat.scale},(_,i)=>i+1).map(n=>`<button class="skb${val===n?" on":""}" style="${val===n?"background:"+sc((n/cat.scale)*100)+";border-color:"+sc((n/cat.scale)*100)+";":""}" data-a="score" data-v="${cat.id}|${item.id}|${n}">${n}</button>`).join("");
      const comment=item.hc?`<input type="text" class="inp" style="margin-top:8px;font-size:13px;padding:7px 10px;" placeholder="Comment (optional)" value="${esc(inspData.comments[key]||"")}" data-commentkey="${key}">`:"";
      return `<div style="background:#0a1628;border-radius:9px;padding:14px;border:1px solid #1e3a5f;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-weight:500;font-size:14px;">${esc(item.label)}</span>
          <span style="font-family:monospace;font-size:15px;font-weight:700;color:${val===undefined?"#334155":sc((val/cat.scale)*100)}">${val===undefined?"--":val+"/"+cat.scale}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${btns}</div>${comment}</div>`;
    }).join("");
    body=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;"><h2 style="font-size:17px;font-weight:700;">${esc(cat.label)}</h2><span style="background:#0d1f3c;color:#93c5fd;padding:3px 10px;border-radius:6px;font-size:12px;">Out of ${cat.scale}</span></div><div style="display:flex;flex-direction:column;gap:14px;">${items}</div>`;
  } else {
    const photos=(inspData.photos||[]).map((ph,i)=>`<div style="position:relative;"><img src="${ph.data}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;"><button style="position:absolute;top:3px;right:3px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;" data-a="del-photo" data-v="${i}">x</button></div>`).join("");
    body=`<h2 style="font-size:17px;font-weight:700;margin-bottom:6px;">Photos & Submit</h2>
      <p style="color:#475569;font-size:13px;margin-bottom:16px;">Review your score and save.</p>
      <div style="background:#0a1628;border-radius:10px;padding:16px;margin-bottom:16px;text-align:center;border:2px solid ${sc(pct)}30;">${ring(pct,90)}<div style="margin-top:6px;font-size:18px;font-weight:700;color:${sc(pct)}">${sl(pct)}</div><div style="color:#475569;font-size:12px;margin-top:2px;">${esc(inspData.truck)}</div></div>
      <input type="file" id="photo-file" accept="image/*" multiple style="display:none">
      <button class="btn bg" style="width:100%;padding:12px;margin-bottom:12px;" data-a="add-photo">Add Photos</button>
      <div class="g3">${photos}</div>`;
  }
  const back=`<button class="btn bg" style="flex:1;" data-a="insp-back">Back</button>`;
  const fwd=isPhotos?`<button class="btn bs" style="flex:2;" data-a="insp-save">Save Inspection</button>`:`<button class="btn bp" style="flex:2;" data-a="insp-next">Next</button>`;
  return `${prog}<div class="card" style="margin-bottom:14px;">${body}</div><div style="display:flex;gap:10px;">${back}${fwd}</div>`;
}

function inspDetail(){
  const r=S.detailInsp;
  if(!r) return "";
  const cats=S.cats.map(cat=>{
    const scored=cat.items.filter(i=>r.scores[cat.id+":"+i.id]!==undefined);
    if(!scored.length) return "";
    const e=scored.reduce((a,i)=>a+(r.scores[cat.id+":"+i.id]||0),0);
    const cp=Math.round((e/(cat.items.length*cat.scale))*100);
    return `<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;"><div style="padding:10px 14px;background:#0a1628;display:flex;justify-content:space-between;"><span style="font-weight:600;font-size:14px;">${esc(cat.label)}</span><span style="font-family:monospace;font-size:13px;font-weight:700;color:${sc(cp)}">${cp}%</span></div><div style="padding:14px;">${cat.items.map(item=>{const s=r.scores[cat.id+":"+item.id];const cm=r.comments?.[cat.id+":"+item.id];return `<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;"><div><div style="font-size:13px;">${esc(item.label)}</div>${cm?`<div style="font-size:11px;color:#64748b;">"${esc(cm)}"</div>`:""}</div><span style="font-family:monospace;font-size:13px;font-weight:700;white-space:nowrap;color:${s===undefined?"#334155":sc((s/cat.scale)*100)}">${s===undefined?"--":s+"/"+cat.scale}</span></div>`;}).join("")}</div></div>`;
  }).join("");
  const photos=r.photos?.length?`<div class="card" style="margin-top:8px;"><div style="font-size:11px;color:#475569;text-transform:uppercase;margin-bottom:10px;">Photos (${r.photos.length})</div><div class="g3">${r.photos.map(ph=>`<img src="${ph.data}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;">`).join("")}</div></div>`:"";
  return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;"><button class="btn bg" data-a="insp-view" data-v="list">Back</button><button class="btn bd" data-a="insp-del" data-v="${r.id}">Delete</button></div>
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:20px;">${ring(r.pct,72)}<div><h2 style="font-size:20px;font-weight:700;">${esc(r.truck)}</h2><div style="color:#475569;font-size:13px;margin-top:3px;">${fd(r.date)}${r.inspector?" - "+esc(r.inspector):""}</div>${r.mileage?`<div style="color:#64748b;font-size:12px;margin-top:2px;">${Number(r.mileage).toLocaleString()} miles</div>`:""}</div></div>
    ${r.notes?`<div class="card" style="margin-bottom:12px;"><div style="font-size:11px;color:#475569;text-transform:uppercase;margin-bottom:5px;">Notes</div><p style="font-size:13px;color:#cbd5e1;">${esc(r.notes)}</p></div>`:""}
    ${cats}${photos}`;
}

function calcPct(){
  let e=0,p=0;
  S.cats.forEach(c=>c.items.forEach(item=>{p+=c.scale;const s=S.inspData.scores[c.id+":"+item.id];if(s!==undefined)e+=s;}));
  return p>0?Math.round((e/p)*100):0;
}

async function saveInsp(){
  const pct=calcPct();
  const rec={id:uid(),date:new Date().toISOString(),...S.inspData,pct};
  S.inspections.unshift(rec);
  S.inspView="home"; save(); render();
  const catH=S.cats.flatMap(c=>c.items.map(i=>c.label+": "+i.label+" (/"+c.scale+")"));
  const headers=["Date","Truck","Inspector","Mileage","Overall %",...catH];
  const catS=S.cats.flatMap(c=>c.items.map(item=>{const s=S.inspData.scores[c.id+":"+item.id];return s!==undefined?s:"";}));
  const row=[new Date(rec.date).toLocaleDateString("en-US"),rec.truck,rec.inspector||"",rec.mileage||"",pct,...catS];
  try { await gs("logInspectionServer",{headers,row}); } catch(e){}
}

async function doAdj(id){
  const val=parseInt(document.getElementById("adj-"+id)?.value);
  if(isNaN(val)){alert("Enter a valid quantity.");return;}
  const sel=document.getElementById("adj-reason-"+id);
  const otherInp=document.getElementById("adj-reason-other-"+id);
  let reason=(sel?sel.value:"Adjustment");
  if(reason==="Other") reason=(otherInp&&otherInp.value.trim())?otherInp.value.trim():"Other";
  const p=S.products.find(x=>x.id===id); if(!p) return;
  const old=p.qty;
  const newQty=Math.max(0,val);
  p.qty=newQty; S._adjId=null;
  save();
  try {
    await gs("updateQtyServer",{row:p.row,qty:newQty});
    await gs("logAdjustmentServer",{product:p.name,unit:p.unit,oldQty:old,newQty:newQty,manager:S.managerName,reason:reason});
  } catch(e){ console.warn("Adj sheet write:",e); }
  render();
}

async function submitCheckout(){
  const techSel=document.getElementById("check-tech");
  const tech=techSel?techSel.value:S.checkTech;
  if(!tech){alert("Please select your name.");return;}
  S.checkTech=tech;
  const valid=S.checkItems.filter(i=>i.productId&&parseInt(i.qty)>0);
  if(!valid.length){alert("Please add at least one product with a quantity.");return;}
  const isM=S.role==="manager";

  // For techs: check truck inventory against manager-set thresholds
  if(!isM){
    const truckInv=(S.truckInventories[tech]||{}).products||[];
    const hasEnough=valid.filter(function(item){
      const t=truckInv.find(function(t){return t.id===item.productId;});
      if(!t) return false;
      const prod=S.products.find(function(p){return p.id===item.productId;});
      const threshold=prod?((prod.truckWarnAbove!==undefined)?prod.truckWarnAbove:0):0;
      // Warn if threshold is set (>0) and truck qty is above threshold
      return threshold>0 && t.qty>threshold;
    });
    if(hasEnough.length>0){
      const names=hasEnough.map(function(item){
        const p=S.products.find(function(p){return p.id===item.productId;});
        const t=truckInv.find(function(t){return t.id===item.productId;});
        return (p?p.name:"Product")+": "+t.qty+" "+t.unit+" on your truck";
      }).join("\n");
      alert("Your truck inventory shows you already have enough of the following:\n\n"+names+"\n\nPlease correct your truck inventory first, then request again if still needed.");
      return;
    }
  }
  const te=S.techEmails.find(t=>t.name===tech);
  const techEmail=te?te.email:"";
  const date=new Date().toISOString();

  if(isM){
    // Manager checkout - process each item, update inventory, log to sheet
    const low=[];
    for(const item of valid){
      const prod=S.products.find(p=>p.id===item.productId); if(!prod) continue;
      const newQty=Math.max(0,prod.qty-parseInt(item.qty));
      prod.qty=newQty;
      const rec={id:uid(),date,tech,techEmail,product:prod.name,qty:parseInt(item.qty),unit:prod.unit,notes:item.notes||""};
      S.checkouts.unshift(rec);
      try { await gs("updateQtyServer",{row:prod.row,qty:newQty}); await gs("logCheckoutServer",rec); } catch(e){}
      if(prod.qty<=prod.lowAt) low.push(prod);
    }
    if(low.length) sendLowEmail(low);
  } else {
    // Tech request - bundle ALL items into ONE order with ONE email
    const orderId="ORD-"+Date.now();
    const itemLines=valid.map(function(item){
      const prod=S.products.find(p=>p.id===item.productId);
      return prod?(prod.name+" x "+item.qty+" "+prod.unit+(item.notes?" ("+item.notes+")":"")):item.productId;
    });

    // Add each product as separate order record in sheet/app (for individual approval)
    // but send only ONE combined email
    const orders=[];
    for(const item of valid){
      const prod=S.products.find(p=>p.id===item.productId); if(!prod) continue;
      const order={id:orderId+"-"+prod.id,date,tech,techEmail,product:prod.name,productId:prod.id,
        requestedQty:parseInt(item.qty),unit:prod.unit,notes:item.notes||"",status:"Pending"};
      S.orders.unshift(order);
      orders.push(order);
      try { await gs("addPendingOrderServer",order); } catch(e){}
    }

    // Send ONE combined email for all items
    if(orders.length>0){
      const itemList=itemLines.join("\n  - ");
      const body="Product Request - Fox Pest Control Willamette Valley\n\n"
        +"Technician: "+tech+"\n"
        +"Date: "+new Date(date).toLocaleDateString("en-US")+"\n\n"
        +"Items Requested:\n  - "+itemList+"\n\n"
        +"Log in to the Admin Hub to approve or deny each item.\n\n"
        +"Automated notification from Fox Admin Hub.";
      try { await gs("sendEmailServer",{to:getMGMT().join(","),
        subject:"[Fox Pest Control] Product Request - "+tech+" ("+orders.length+" item"+(orders.length>1?"s":"")+")",
        body:body}); } catch(e){}
    }
  }
  save(); S.checkDone=true; render();
}

function getBaseId(orderId){
  var parts = orderId.split("-");
  return parts[0]+"-"+parts[1];
}

function renderOrders(){
  const {orders,products}=S;
  const filter=S.ordersFilter;
  const pend=orders.filter(o=>o.status==="Pending").length;
  function osc(st){return st==="Pending"?"#f59e0b":st==="Approved"?"#22c55e":"#ef4444";}
  const fbtns=["Pending","Approved","Denied","All"].map(function(f){
    return "<button class='fb"+(filter===f?" on":"")+"' data-a='order-filter' data-v='"+f+"'>"+f+(f==="Pending"&&pend>0?" ("+pend+")":"")+"</button>";
  }).join("");

  // Group orders by base order ID
  var groups = {};
  orders.forEach(function(o){
    var baseId = getBaseId(o.id);
    if(!groups[baseId]) groups[baseId]={tech:o.tech,techEmail:o.techEmail,date:o.date,status:o.status,items:[]};
    groups[baseId].items.push(o);
    if(o.status==="Pending") groups[baseId].status="Pending";
  });

  var filteredGroups = Object.values(groups).filter(function(g){
    return filter==="All" || g.status===filter;
  });

  var cards = filteredGroups.map(function(group){
    var baseId = getBaseId(group.items[0].id);
    var isActive = S.editOrderId===baseId;
    var anyPending = group.items.some(function(o){ return o.status==="Pending"; });
    var groupStatus = group.status;

    var itemRows = group.items.map(function(o){
      var prod = products.find(function(p){ return p.id===o.productId; });
      var stockInfo = prod?" <span style='color:#475569;font-size:11px;'>"+prod.qty+" in stock</span>":"";
      var approvedInfo = o.status==="Approved"
        ?"<div style='font-size:11px;color:#22c55e;margin-top:2px;'>Approved: "+o.approvedQty+" "+esc(o.unit)+" by "+esc(o.approvedBy)+"</div>"
        :o.status==="Denied"
        ?"<div style='font-size:11px;color:#ef4444;margin-top:2px;'>Denied by "+esc(o.approvedBy||"")+(o.denyReason?" - "+esc(o.denyReason):"")+"</div>"
        :"";

      if(isActive && o.status==="Pending"){
        // Show per-item controls: qty input + approve/deny toggle
        var itemDecision = S._itemDecisions ? (S._itemDecisions[o.id]||"approve") : "approve";
        return "<div style='background:#0a1628;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #1e3a5f;'>"
          +"<div style='display:flex;align-items:center;gap:8px;margin-bottom:8px;'>"
          +"<div style='flex:1;font-size:14px;font-weight:600;'>"+esc(o.product)+"</div>"
          +(o.notes?"":"")
          +"</div>"
          +(o.notes?"<div style='font-size:11px;color:#64748b;font-style:italic;margin-bottom:8px;'>"+esc(o.notes)+"</div>":"")
          +"<div style='display:flex;align-items:center;gap:8px;'>"
          +"<div style='font-size:12px;color:#94a3b8;'>Qty:</div>"
          +"<input type='number' class='inp' id='aqty-"+o.id+"' value='"+o.requestedQty+"' style='width:70px;padding:5px;font-size:14px;font-weight:700;text-align:center;'>"
          +"<div style='font-size:12px;color:#64748b;'>"+esc(o.unit)+stockInfo+"</div>"
          +"<div style='margin-left:auto;display:flex;gap:6px;'>"
          +"<button class='btn "+(itemDecision==="approve"?"bs":"bg")+"' style='padding:5px 12px;font-size:12px;' data-a='toggle-item-decision' data-v='"+o.id+"|approve'>Approve</button>"
          +"<button class='btn "+(itemDecision==="deny"?"bd":"bg")+"' style='padding:5px 12px;font-size:12px;' data-a='toggle-item-decision' data-v='"+o.id+"|deny'>Deny</button>"
          +"</div></div>"
          +(prod&&parseInt(o.requestedQty)>prod.qty?"<div style='font-size:11px;color:#f97316;margin-top:4px;'>Only "+prod.qty+" in stock</div>":"")
          +"</div>";
      } else {
        // Show read-only row
        var badge = o.status!=="Pending"
          ?"<span style='font-size:11px;font-weight:600;color:"+osc(o.status)+";margin-left:6px;'>"+o.status+"</span>":"";
        return "<div style='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #0a1628;'>"
          +"<div style='flex:1;'><div style='font-size:14px;font-weight:600;'>"+esc(o.product)+badge+"</div>"
          +(o.notes?"<div style='font-size:11px;color:#64748b;font-style:italic;'>"+esc(o.notes)+"</div>":"")
          +approvedInfo+"</div>"
          +"<div style='text-align:right;font-weight:700;'>"+o.requestedQty+" "+esc(o.unit)+stockInfo+"</div>"
          +"</div>";
      }
    }).join("");

    var panel="";
    if(anyPending&&!isActive){
      panel="<div style='display:flex;gap:8px;padding-top:10px;border-top:1px solid #1e3a5f;margin-top:4px;'>"
        +"<button class='btn bs' style='flex:1;padding:10px;font-size:14px;' data-a='order-action' data-v='"+baseId+"|approve'>Review &amp; Approve</button>"
        +"<button class='btn bd' style='flex:1;padding:10px;font-size:14px;' data-a='order-action' data-v='"+baseId+"|deny'>Deny All</button>"

        +"<div style='display:flex;gap:8px;'>"
        +"<button class='btn bs' style='flex:2;padding:10px;font-size:14px;' data-a='approve-order' data-v='"+baseId+"'>Submit Decisions</button>"
        +"<button class='btn bg' style='flex:1;padding:10px;font-size:13px;' data-a='order-action-cancel'>Cancel</button>"
        +"</div></div>";
    }

    return "<div class='card' style='margin-bottom:12px;"+(anyPending?"border-color:#92400e30;":"")+"'>"
      +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;'>"
      +"<div><div style='font-weight:700;font-size:16px;'>"+esc(group.tech)+"</div>"
      +"<div style='color:#64748b;font-size:12px;margin-top:2px;'>"+fd(group.date)+" &bull; "+group.items.length+" item"+(group.items.length>1?"s":"")+"</div></div>"
      +"<span class='sbdg' style='background:"+osc(groupStatus)+"22;color:"+osc(groupStatus)+";white-space:nowrap;'>"+groupStatus+"</span>"
      +"</div>"
      +itemRows+panel+"</div>";
  }).join("");

  document.getElementById("pg-orders").innerHTML=
    "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;'>"
    +"<div><h2 style='font-size:20px;font-weight:700;'>Product Orders</h2>"
    +(pend>0?"<p style='color:#f59e0b;font-size:13px;margin-top:2px;'>"+pend+" pending approval</p>":"")
    +"</div><button class='btn bg' style='font-size:11px;padding:5px 10px;' data-a='refresh-orders'>Refresh</button></div>"
    +"<div style='display:flex;gap:6px;margin-bottom:16px;'>"+fbtns+"</div>"
    +(filteredGroups.length===0?"<div style='text-align:center;color:#475569;padding:40px;'>No "+filter.toLowerCase()+" orders.</div>":cards);
}

async function confirmApprove(baseId){
  var groupOrders = S.orders.filter(function(o){ return getBaseId(o.id)===baseId && o.status==="Pending"; });
  if(!groupOrders.length) return;
  var tech = groupOrders[0].tech;
  var techEmail = groupOrders[0].techEmail||"";
  var reason = (document.getElementById("deny-rsn-"+baseId)||{}).value||"";
  var approvedItems=[], deniedItems=[], low=[];

  for(var i=0; i<groupOrders.length; i++){
    var order = groupOrders[i];
    var decision = (S._itemDecisions&&S._itemDecisions[order.id])||"approve";
    var qtyInp = document.getElementById("aqty-"+order.id);
    var qty = qtyInp ? (parseInt(qtyInp.value)||order.requestedQty) : order.requestedQty;
    var prod = S.products.find(function(p){ return p.id===order.productId; });

    if(decision==="approve"){
      if(prod){ var nq=Math.max(0,prod.qty-qty); prod.qty=nq; try{await gs("updateQtyServer",{row:prod.row,qty:nq});}catch(e){} if(prod.qty<=prod.lowAt) low.push(prod); }
      order.status="Approved"; order.approvedQty=qty; order.approvedBy=S.managerName;
      approvedItems.push(order.product+" x "+qty+" "+esc(order.unit));
      try { await gs("updateOrderStatusServer",{orderId:order.id,status:"Approved",approvedQty:qty,approvedBy:S.managerName}); await gs("addOrderHistoryServer",Object.assign({},order,{approvedQty:qty,approvedBy:S.managerName})); } catch(e){}
    } else {
      order.status="Denied"; order.approvedQty=0; order.approvedBy=S.managerName; order.denyReason=reason;
      deniedItems.push(order.product+" x "+order.requestedQty+" "+esc(order.unit));
      try { await gs("updateOrderStatusServer",{orderId:order.id,status:"Denied",approvedQty:0,approvedBy:S.managerName}); } catch(e){}
    }
  }

  S.editOrderId=null; S._itemDecisions={}; save(); renderOrders();

  // One email summarizing both approved and denied
  var te=techEmail; // Only send to tech on approval/denial
  if(!te){ console.warn("No tech email found, skipping approval email"); S.editOrderId=null; S._itemDecisions={}; save(); renderOrders(); if(low.length) sendLowEmail(low); return; }
  var body="Order Decision - Fox Pest Control Willamette Valley\n\n"
    +"Technician: "+tech+"\nDecided By: "+S.managerName+"\n\n";
  if(approvedItems.length) body+="APPROVED:\n  - "+approvedItems.join("\n  - ")+"\n\n";
  if(deniedItems.length) body+="DENIED:\n  - "+deniedItems.join("\n  - ")+(reason?"\nReason: "+reason:"")+"\n\n";
  if(approvedItems.length) body+="Approved items will be ready for pickup.\n";
  if(deniedItems.length) body+="Please contact your manager regarding denied items.\n";
  body+="\nAutomated notification from Fox Admin Hub.";
  var subj="[Fox Pest Control] Order Decision - "+tech
    +(approvedItems.length&&deniedItems.length?" (Mixed)"
    :approvedItems.length?" (Approved)":"(Denied)");
  try { await gs("sendEmailServer",{to:te,subject:subj,body:body}); } catch(e){}
  if(low.length) sendLowEmail(low);
}

async function confirmDeny(baseId){
  // Deny All shortcut - sets all to deny and calls confirmApprove which handles it
  var groupOrders = S.orders.filter(function(o){ return getBaseId(o.id)===baseId && o.status==="Pending"; });
  if(!S._itemDecisions) S._itemDecisions={};
  groupOrders.forEach(function(o){ S._itemDecisions[o.id]="deny"; });
  await confirmApprove(baseId);
}

async function sendLowEmail(low){
  const list=low.map(p=>"  - "+p.name+": "+p.qty+" "+p.unit+" (min: "+p.lowAt+")").join("\n");
  try { await gs("sendEmailServer",{to:getMGMT().join(","),subject:"[Fox Pest Control] Low Stock Alert - "+low.length+" item"+(low.length>1?"s":"")+" need restocking",body:"Low Stock Alert - Willamette Valley\n\n"+list+"\n\nPlease restock soon.\n\nAutomated notification."}); } catch(e){}
}

// ─── Remove Product from Inventory ───────────────────────────────────────────
async function removeProd(id){
  const p = S.products.find(function(x){return x.id===id;});
  if(!p) return;
  // If no row number, sync first to get it
  if(!p.row){
    alert("Product row number unknown. Please tap Sync first to refresh sheet data, then try removing again.");
    return;
  }
  if(!confirm("Remove "+p.name+" from inventory? This will remove it from both the app and the sheet.")) return;
  // Remove from sheet FIRST before updating app
  try {
    const result = await gs("removeProductFromSheetServer",{row:p.row});
    if(result && result.ok){
      S.products = S.products.filter(function(x){return x.id!==id;});
      S._restockId=null; S._adjId=null;
      save(); renderInv();
    } else {
      alert("Could not remove from sheet. Please sync and try again.");
    }
  } catch(e){
    console.warn("Remove from sheet:",e);
    alert("Error: "+e.message);
  }
}

async function invAddProduct(){
  const name = (document.getElementById("new-prod-name")||{}).value||"";
  const unit = (document.getElementById("new-prod-unit")||{}).value||"each";
  const qty  = parseInt((document.getElementById("new-prod-qty")||{}).value)||0;
  const lowAt= parseInt((document.getElementById("new-prod-lowat")||{}).value)||0;
  if(!name.trim()){alert("Please enter a product name.");return;}
  // Add to local products
  const newProd = {id:"sheet_new_"+Date.now(), name:name.trim(), unit:unit.trim(), qty:qty, lowAt:lowAt, reorderNote:"", truckWarnAbove:0, row:null};
  S.products.push(newProd);
  S._showAddProd = false;
  save();
  renderInv();
  // Write to sheet
  try {
    const result = await gs("addProductToSheetServer", {name:name.trim(), unit:unit.trim(), qty:qty, lowAt:lowAt});
    if(result && result.row){
      // Update the product with its real row number
      const p = S.products.find(function(p){return p.id===newProd.id;});
      if(p){ p.id="sheet_"+result.row; p.row=result.row; save(); }
    }
  } catch(e){ console.warn("Add product to sheet:", e); }
}

function renderTruckInvManager(pg){
  var techNames = Object.keys(S.truckInventories);
  if(techNames.length === 0){
    pg.innerHTML = "<h2 style='font-size:20px;font-weight:700;margin-bottom:16px;'>Truck Inventories</h2>"
      +"<div style='text-align:center;color:#475569;padding:40px;'>"
      +"<div style='font-size:36px;margin-bottom:12px;'>&#x1F69A;</div>"
      +"<p>No truck inventories submitted yet.</p>"
      +"<p style='font-size:13px;margin-top:8px;'>Techs submit their first inventory from the My Truck tab.</p></div>";
    return;
  }

  var cards = techNames.map(function(techName){
    var inv = S.truckInventories[techName];
    var lastDate = inv.lastSubmit ? fd(inv.lastSubmit) : "Never";
    var daysSince = inv.lastSubmit ? Math.floor((Date.now()-new Date(inv.lastSubmit).getTime())/(1000*60*60*24)) : 999;
    var stale = daysSince > 8;
    var variances = (inv.products||[]).filter(function(p){ return p.prevQty>0 && p.qty < p.prevQty*0.5; });

    var prodRows = (inv.products||[]).map(function(p){
      var change = p.prevQty !== undefined ? p.qty - p.prevQty : null;
      var isVar = p.prevQty > 0 && p.qty < p.prevQty * 0.5;
      var changeHtml = change !== null
        ? "<span style='font-size:12px;color:"+(change<0?"#ef4444":change>0?"#22c55e":"#475569")+";'>"+(change>0?"+":"")+change+"</span>"
        : "";
      return "<div style='display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0a1628;'>"
        +"<span style='font-size:13px;"+(isVar?"color:#f97316;font-weight:600;":"")+"'>"+esc(p.name)+"</span>"
        +"<div style='display:flex;align-items:center;gap:10px;'>"+changeHtml
        +"<span style='font-family:monospace;font-weight:700;color:"+(isVar?"#f97316":"#e2e8f0")+";'>"+p.qty+" "+esc(p.unit)+"</span>"
        +"</div></div>";
    }).join("");

    var badges = (stale ? "<span style='padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#431407;color:#fb923c;'>Overdue</span>" : "")
      + (variances.length>0 ? "<span style='padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#1c0a00;color:#f97316;'>"+variances.length+" variance"+(variances.length>1?"s":"")+"</span>" : "");

    return "<div class='card' style='margin-bottom:12px;"+(variances.length>0?"border-color:#c2410c30;":"")+"'>"
      +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;'>"
      +"<div><div style='font-weight:700;font-size:16px;'>"+esc(techName)+"</div>"
      +"<div style='font-size:12px;color:#64748b;margin-top:2px;'>"+esc(inv.truck||"")+" &bull; Last count: "+lastDate+"</div></div>"
      +"<div style='display:flex;flex-direction:column;align-items:flex-end;gap:4px;'>"+badges+"</div></div>"
      +"<div>"+(prodRows||"<div style='color:#475569;font-size:13px;'>No products recorded.</div>")+"</div></div>";
  }).join("");

  pg.innerHTML = "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;'>"
    +"<h2 style='font-size:20px;font-weight:700;'>Truck Inventories</h2>"
    +"<span style='font-size:12px;color:#475569;'>"+techNames.length+" truck"+(techNames.length!==1?"s":"")+"</span></div>"
    +"<p style='color:#475569;font-size:13px;margin-bottom:16px;'>Weekly counts submitted by technicians. Variances flagged when a product drops more than 50% from the previous week.</p>"
    +cards;
}

// Action handlers for truck inventory
function tiAddProd(){
  var sel = document.getElementById("ti-add-prod");
  if(!sel||!sel.value) return;
  var prod = S.products.find(function(p){ return p.id===sel.value; });
  if(!prod) return;
  var qtyInp = document.getElementById("ti-add-qty");
  var qty = qtyInp ? (parseInt(qtyInp.value)||0) : 0;
  var techName = S.currentUser ? S.currentUser.name : S.checkTech;
  if(!S.truckInventories[techName]) S.truckInventories[techName]={truck:"",products:[],lastSubmit:null};
  S.truckInventories[techName].products.push({id:prod.id,name:prod.name,unit:prod.unit,qty:qty,prevQty:0,warnBelow:0});
  save(); renderTruckInv();
}

function tiRemoveProd(idx){
  var techName = S.currentUser ? S.currentUser.name : S.checkTech;
  if(!S.truckInventories[techName]) return;
  S.truckInventories[techName].products.splice(parseInt(idx),1);
  save(); renderTruckInv();
}

async function tiSubmit(){
  var techName = S.currentUser ? S.currentUser.name : S.checkTech;
  if(!techName){ alert("Could not identify technician."); return; }

  // Get truck selection
  var truckSel = document.getElementById("ti-truck-select");
  var truck = truckSel ? truckSel.value : (S.truckInventories[techName]||{}).truck||"";
  if(!truck){ alert("Please select your truck first."); return; }

  if(!S.truckInventories[techName]) S.truckInventories[techName]={truck:"",products:[],lastSubmit:null};
  var inv = S.truckInventories[techName];
  inv.truck = truck;

  // Read current qty values from inputs
  var variances = [];
  (inv.products||[]).forEach(function(p, i){
    var inp = document.getElementById("ti-qty-"+i);
    if(inp){
      var newQty = parseInt(inp.value)||0;
      var prev = p.qty;
      // Check variance - more than 50% drop
      if(prev > 0 && newQty < prev * 0.5){
        variances.push({name:p.name, prev:prev, current:newQty, unit:p.unit, drop:Math.round((1-(newQty/prev))*100)});
      }
      p.prevQty = prev;
      p.qty = newQty;
    }
  });

  inv.lastSubmit = new Date().toISOString();
  save();

  // Log to sheet BEFORE re-rendering
  var rows = (inv.products||[]).map(function(p){
    return [new Date().toLocaleDateString("en-US"), techName, truck||inv.truck||"", p.name, p.unit, p.qty, p.prevQty||0, p.qty-(p.prevQty||0)];
  });
  if(rows.length > 0){
    try {
      await gs("logTruckInventoryServer", {rows:rows, headers:["Date","Technician","Truck","Product","Unit","Qty","Prev Qty","Change"]});
    } catch(e){ console.warn("Sheet log:", e); }
  }

  renderTruckInv();

  // Send variance email if needed
  if(variances.length > 0){
    var varList = variances.map(function(v){ return "  - "+v.name+": was "+v.prev+" "+v.unit+", now "+v.current+" "+v.unit+" ("+v.drop+"% drop)"; }).join("\n");
    var emailBody = "Truck Inventory Variance Alert - Fox Pest Control Willamette Valley\n\n"
      +"Technician: "+techName+"\nTruck: "+truck+"\nDate: "+new Date().toLocaleDateString("en-US")+"\n\n"
      +"The following products dropped more than 50% from last week:\n"+varList
      +"\n\nPlease review with the technician.\n\nAutomated notification from Fox Admin Hub.";
    try {
      await gs("sendEmailServer", {
        to: getMGMT().join(","),
        subject: "[Fox Pest Control] Truck Inventory Variance - "+techName+" - "+variances.length+" item"+(variances.length>1?"s":""),
        body: emailBody
      });
    } catch(e){ console.warn("Email:", e); }
    alert("Inventory submitted! Note: "+variances.length+" variance"+(variances.length>1?"s were":"was")+" detected and reported to management.");
  } else {
    alert("Inventory submitted successfully!");
  }
}

async function sendLoginEmail(role, idx){
  const acct = role==="manager" ? S.managers[idx] : S.techAccounts[idx];
  if(!acct){ alert("Account not found."); return; }
  if(!acct.email){ alert("No email address set for "+acct.name+". Please add an email first."); return; }
  const tempPin = acct.isTemp ? acct.tempPin : "";
  if(!tempPin){ 
    const reset = confirm(acct.name+" has already set their PIN. Would you like to reset it first so you can send them a new temp PIN?");
    if(!reset) return;
    const newPin = prompt("New temporary PIN for "+acct.name+" (4-8 digits):");
    if(!newPin||newPin.length<4){ alert("PIN must be at least 4 digits."); return; }
    acct.pin=""; acct.tempPin=newPin; acct.isTemp=true;
    if(role==="manager") S.managers[idx]=acct; else S.techAccounts[idx]=acct;
    save(); saveAccountsToSheet();
  }
  const pin = acct.isTemp ? acct.tempPin : tempPin;
  const appUrl = window.location.href.split("?")[0];
  const subject = "Fox Pest Control Admin Hub - Your Login Information";
  const body = "Hello "+acct.name+",\n\n"
    +"You have been set up on the Fox Pest Control Willamette Valley Admin Hub.\n\n"
    +"App URL: "+appUrl+"\n"
    +"Your Email: "+acct.email+"\n"
    +"Temporary PIN: "+pin+"\n\n"
    +"To log in:\n"
    +"1. Open the App URL above\n"
    +"2. Enter your email address\n"
    +"3. Enter your temporary PIN\n"
    +"4. You will be prompted to create your own personal PIN\n\n"
    +"Please keep your PIN private.\n\n"
    +"Fox Pest Control - Willamette Valley Branch";
  try {
    await gs("sendEmailServer", {to: acct.email, subject: subject, body: body});
    alert("Login email sent to "+acct.email+"!");
    render();
  } catch(e){
    alert("Could not send email: "+e.message);
  }
}

// Safe click + touch setter for mobile compatibility
function tap(id, k){
  var el = document.getElementById(id);
  if(!el){ if(dbg) dbg.textContent = "Missing: "+id; return; }
  // onclick for desktop
  el.onclick = function(){ pinTap(k); };
  // touchend for mobile (prevents double-fire with onclick)
  el.addEventListener("touchend", function(e){
    e.preventDefault();
    pinTap(k);
  }, {passive:false});
}

// Global click + touch handler for mobile compatibility
function globalHandler(e){
  var t = e.target;
  while(t && t !== document.body){
    if(t.getAttribute && t.getAttribute("data-a")){
      if(e.type==="touchend") e.preventDefault();
      handleAction(t.getAttribute("data-a"), t.getAttribute("data-v")||"", t, e);
      return;
    }
    t = t.parentElement;
  }
}
document.body.onclick = globalHandler;
document.body.addEventListener("touchend", globalHandler, {passive:false});

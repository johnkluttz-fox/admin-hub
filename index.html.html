<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1628;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;font-size:15px;}
input,textarea,select,button{font-family:inherit;}
.btn{cursor:pointer;border:none;border-radius:8px;font-weight:600;transition:all .15s;padding:10px 18px;font-size:14px;}
.btn:active{transform:scale(.97);}
.bp{background:#2563eb;color:#fff;} .bp:hover{background:#1d4ed8;}
.bg{background:transparent;color:#94a3b8;border:1px solid #1e3a5f;} .bg:hover{border-color:#3b82f6;color:#e2e8f0;}
.bs{background:#16a34a;color:#fff;} .bs:hover{background:#15803d;}
.bd{background:#dc2626;color:#fff;padding:6px 12px;font-size:12px;} .bd:hover{background:#b91c1c;}
.card{background:#0f1f38;border-radius:12px;border:1px solid #1e3a5f;padding:16px;}
.inp{background:#0a1628;color:#e2e8f0;border:1px solid #1e3a5f;border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;}
.inp:focus{border-color:#3b82f6;}
#hdr{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:0 16px;position:sticky;top:0;z-index:50;}
#hdr-in{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;}
#nav{display:flex;gap:2px;}
.nb{display:flex;align-items:center;gap:4px;padding:6px 9px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#64748b;}
.nb.on{background:#1e3a5f;color:#93c5fd;}
.bdg{background:#ef4444;color:#fff;border-radius:50%;width:15px;height:15px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;}
#wrap{max-width:760px;margin:0 auto;padding:20px 14px;}
.pg{display:none;} .pg.on{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sc{background:#0f1f38;border-radius:12px;border:1px solid #1e3a5f;padding:16px;}
.al-o{background:#431407;border:1px solid #c2410c;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer;}
.al-a{background:#1c1100;border:1px solid #92400e;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer;}
.sbdg{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.pb{height:3px;background:#0f1f38;border-radius:2px;margin-bottom:16px;}
.pf{height:100%;background:#2563eb;border-radius:2px;transition:width .3s;}
.skb{width:34px;height:34px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-weight:700;font-size:13px;background:#0a1628;color:#64748b;}
.skb.on{color:#fff;}
.fb{padding:5px 12px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#64748b;}
.fb.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;}
.stb{padding:6px 12px;border-radius:7px;border:1px solid #1e3a5f;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:#64748b;}
.stb.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.pd{width:14px;height:14px;border-radius:50%;background:#1e3a5f;transition:background .15s;display:inline-block;}
.pd.on{background:#3b82f6;}
.pk{background:#162235;color:#e2e8f0;border:1px solid #1e3a5f;border-radius:10px;padding:16px 0;font-size:20px;font-weight:600;cursor:pointer;width:100%;text-align:center;-webkit-tap-highlight-color:transparent;}
.pk:active{background:#1e3a5f;}
.pk.del{background:#1e293b;color:#94a3b8;font-size:14px;}
.tag-low{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#431407;color:#fb923c;}

function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function save(){["pins","managerName","trucks","techs","techEmails","cats","inspections","products","checkouts","orders"].forEach(k=>lsSet("hub:"+k,S[k]));}
function load(){
  ["pins","managerName","trucks","techs","techEmails","cats","inspections","products","checkouts","orders"].forEach(k=>{const v=lsGet("hub:"+k);if(v!=null)S[k]=v;});
  if(!S.products||!S.products.length) S.products=JSON.parse(JSON.stringify(SEED));
}

// ─── Apps Script Bridge via fetch ────────────────────────────────────────────
const BRIDGE = "https://script.google.com/macros/s/AKfycbzX1SVGdraGV6GpjQfwZguWx1IDXQ-OkHqeU-W0C5q9pvojRFY0OgYY-cZ96bFwDUNN/exec";

function gs(fn, data){
  return new Promise(function(res, rej){
    var action = fn.replace("Server","");
    if(data === null || data === undefined){
      // GET request
      fetch(BRIDGE + "?action=" + action)
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.error) rej(new Error(d.error)); else res(d); })
        .catch(rej);
    } else {
      // POST request
      fetch(BRIDGE, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({action: action, data: data})
      })
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.error) rej(new Error(d.error)); else res(d); })
        .catch(rej);
    }
  });
}

async function syncFromSheet(){
  badge("syncing");
  try {
    const [pr,tc] = await Promise.all([gs("getProductsServer"),gs("getTechsServer")]);
    if(pr&&pr.products&&pr.products.length){S.products=pr.products;lsSet("hub:products",pr.products);}
    if(tc&&tc.techs&&tc.techs.length){S.techs=tc.techs.map(t=>t.name);S.techEmails=tc.techs;lsSet("hub:techs",S.techs);lsSet("hub:techEmails",S.techEmails);}
    badge("done");
  } catch(e){ console.warn("Sync:",e.message); badge("err"); }
  render();
}

function badge(s){
  const b=document.getElementById("sync-badge");
  if(!b)return;
  b.style.display="inline";
  if(s==="syncing"){b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#0d1f3c;color:#3b82f6;border:1px solid #1e3a5f;";b.textContent="Syncing";}
  else if(s==="done"){b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#052e16;color:#22c55e;border:1px solid #166534;";b.textContent="Synced";setTimeout(()=>b.style.display="none",3000);}
  else{b.style.cssText="font-size:10px;padding:2px 7px;border-radius:10px;display:inline;background:#1c0a00;color:#f97316;border:1px solid #7c2d12;";b.textContent="Offline";}
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9);}
function fd(iso){return new Date(iso).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});}
function sc(p){return p>=90?"#22c55e":p>=75?"#84cc16":p>=60?"#f59e0b":p>=40?"#f97316":"#ef4444";}
function sl(p){return p>=90?"Excellent":p>=75?"Good":p>=60?"Fair":p>=40?"Poor":"Failing";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ring(pct,sz){sz=sz||80;const r=(sz-10)/2,c=2*Math.PI*r,o=c-(pct/100)*c,col=sc(pct);
  return '<svg width="'+sz+'" height="'+sz+'" style="display:block;margin:0 auto"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="8"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" stroke-linecap="round" transform="rotate(-90 '+sz/2+' '+sz/2+')"/><text x="'+sz/2+'" y="'+(sz/2+5)+'" text-anchor="middle" fill="'+col+'" font-size="'+(sz/4)+'" font-weight="700" font-family="monospace">'+pct+'%</text></svg>';}

// ─── PIN ──────────────────────────────────────────────────────────────────────
let pin="";
function pinTap(k){
  const dbg=document.getElementById("debug");
  const err=document.getElementById("pin-err");
  if(k==="del"){pin=pin.slice(0,-1);dots();if(err)err.textContent="";if(dbg)dbg.textContent="PIN: "+pin;return;}
  if(pin.length>=6)return;
  pin+=k;
  if(dbg)dbg.textContent="PIN: "+pin;
  dots();
  if(pin===S.pins.manager) setTimeout(()=>login("manager"),200);
  else if(pin===S.pins.tech) setTimeout(()=>login("tech"),200);
  else if(pin.length>=4){if(err)err.textContent="Incorrect PIN";pin="";dots();if(dbg)dbg.textContent="PIN: (cleared)";}
}
function dots(){for(let i=0;i<4;i++){const d=document.getElementById("d"+i);if(d)d.className="pd"+(pin.length>i?" on":"");}}
function login(role){
  S.role=role; S.tab=role==="tech"?"checkout":"dashboard";
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  syncFromSheet();
}
function logout(){
  S.role=null; pin=""; dots();
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
  const err=document.getElementById("pin-err");if(err)err.textContent="";
}

// ─── Event Delegation ────────────────────────────────────────────────────────
// click delegation moved to window.load

document.addEventListener("keydown",function(e){
  if(document.getElementById("login").style.display==="none") return;
  if(e.key>="0"&&e.key<="9") pinTap(e.key);
  else if(e.key==="Backspace") pinTap("del");
});

document.addEventListener("change",function(e){
  const t=e.target;
  if(t.id==="check-tech") S.checkTech=t.value;
  if(t.dataset.field&&t.dataset.idx!==undefined){
    const idx=parseInt(t.dataset.idx);
    if(S.checkItems[idx]!==undefined) S.checkItems[idx][t.dataset.field]=t.value;
  }
  if(t.id==="insp-truck") S.inspData.truck=t.value;
  if(t.id==="insp-filter"){S.inspListFilter=t.value;render();}
  if(t.dataset.prodid&&t.dataset.prodfield){
    const p=S.products.find(x=>x.id===t.dataset.prodid);
    if(p) p[t.dataset.prodfield]=t.dataset.prodfield==="unit"?t.value:(parseInt(t.value)||0);
  }
  if(t.id==="mgr-name-inp") S.managerName=t.value;
  if(t.id==="pin-mgr-inp") S._pinMgr=t.value;
  if(t.id==="pin-tech-inp") S._pinTech=t.value;
  if(t.dataset.catid&&t.dataset.catfield){
    const c=S.cats.find(x=>x.id===t.dataset.catid);
    if(c){c[t.dataset.catfield]=t.dataset.catfield==="scale"?parseInt(t.value):t.value;}
    save(); render();
  }
  if(t.dataset.catid&&t.dataset.itemid){
    const c=S.cats.find(x=>x.id===t.dataset.catid);
    if(c){const i=c.items.find(x=>x.id===t.dataset.itemid);if(i)i.label=t.value;save();}
  }
});

document.addEventListener("input",function(e){
  const t=e.target;
  if(t.id==="insp-mileage") S.inspData.mileage=t.value;
  if(t.id==="insp-inspector") S.inspData.inspector=t.value;
  if(t.id==="insp-notes") S.inspData.notes=t.value;
  if(t.dataset.commentkey) S.inspData.comments[t.dataset.commentkey]=t.value;
  if(t.id==="new-truck-inp"||t.id==="new-tech-inp") {}
});

function handleAction(a,v,el,e){
  if(a==="pin") { pinTap(v); return; }
  if(a==="logout") { logout(); return; }
  if(a==="tab") { S.tab=v; S.inspView="home"; S.invView="list"; S.checkDone=false; render(); return; }
  if(a==="insp-view") { S.inspView=v; render(); return; }
  if(a==="insp-start") { S.inspView="form"; S.inspStep=0; S.inspData={truck:S.trucks[0]||"",mileage:"",inspector:"",notes:"",scores:{},comments:{},photos:[]}; render(); return; }
  if(a==="insp-next") { S.inspStep++; render(); return; }
  if(a==="insp-back") { if(S.inspStep===0){S.inspView="home";}else{S.inspStep--;} render(); return; }
  if(a==="insp-save") { saveInsp(); return; }
  if(a==="insp-detail") { S.detailInsp=S.inspections.find(r=>r.id===v); S.inspView="detail"; render(); return; }
  if(a==="insp-del") { if(confirm("Delete this inspection?")){S.inspections=S.inspections.filter(r=>r.id!==v);save();} S.inspView="list"; render(); return; }
  if(a==="score") { const [ci,ii,n]=v.split("|"); const k=ci+":"+ii; const cur=S.inspData.scores[k]; if(cur===parseInt(n))delete S.inspData.scores[k]; else S.inspData.scores[k]=parseInt(n); render(); return; }
  if(a==="add-photo") { document.getElementById("photo-file").click(); return; }
  if(a==="del-photo") { S.inspData.photos.splice(parseInt(v),1); render(); return; }
  if(a==="inv-view") { S.invView=v; render(); return; }
  if(a==="open-restock") { S._restockId=v; S._adjId=null; render(); return; }
  if(a==="open-adj") { S._adjId=v; S._restockId=null; render(); return; }
  if(a==="close-panel") { S._restockId=null; S._adjId=null; render(); return; }
  if(a==="do-restock") { doRestock(v); return; }
  if(a==="do-adj") { doAdj(v); return; }
  if(a==="sync") { syncFromSheet(); return; }
  if(a==="add-check-item") { S.checkItems.push({id:uid(),productId:"",qty:"",notes:""}); render(); return; }
  if(a==="del-check-item") { S.checkItems.splice(parseInt(v),1); render(); return; }
  if(a==="submit-checkout") { submitCheckout(); return; }
  if(a==="checkout-reset") { S.checkDone=false; S.checkItems=[{id:uid(),productId:"",qty:"",notes:""}]; S.checkTech=""; render(); return; }
  if(a==="order-filter") { S.ordersFilter=v; render(); return; }
  if(a==="order-action") { const [id,type]=v.split("|"); S.editOrderId=id; S.editOrderType=type; render(); return; }
  if(a==="order-action-cancel") { S.editOrderId=null; render(); return; }
  if(a==="approve-order") { confirmApprove(v); return; }
  if(a==="deny-order") { confirmDeny(v); return; }
  if(a==="settings-tab") { S.settingsTab=v; render(); return; }
  if(a==="save-pins") { savePins(); return; }
  if(a==="save-mgr-name") { S.managerName=document.getElementById("mgr-name-inp").value||S.managerName; save(); alert("Saved!"); return; }
  if(a==="add-truck") { const inp=document.getElementById("new-truck-inp"); if(inp&&inp.value.trim()){S.trucks.push(inp.value.trim());save();render();} return; }
  if(a==="del-truck") { if(confirm("Remove this truck?")){S.trucks.splice(parseInt(v),1);save();render();} return; }
  if(a==="add-tech") { const inp=document.getElementById("new-tech-inp"); if(inp&&inp.value.trim()){S.techs.push(inp.value.trim());save();render();} return; }
  if(a==="del-tech") { if(confirm("Remove?")){S.techs.splice(parseInt(v),1);save();render();} return; }
  if(a==="toggle-cat") { S.openCat=S.openCat===v?null:v; render(); return; }
  if(a==="add-cat") { const l=prompt("Category name:"); if(!l)return; const sc2=parseInt(prompt("Scale (3,5,10):"))||10; S.cats.push({id:uid(),label:l.trim(),scale:sc2,items:[]}); save(); render(); return; }
  if(a==="del-cat") { if(confirm("Remove category?")){S.cats=S.cats.filter(c=>c.id!==v);save();render();} return; }
  if(a==="add-cat-item") { const l=prompt("Item label:"); if(!l)return; const hc=confirm("Include comment field?"); const c=S.cats.find(x=>x.id===v); if(c){c.items.push({id:uid(),label:l.trim(),hc});save();render();} return; }
  if(a==="del-cat-item") { const [ci,ii]=v.split("|"); const c=S.cats.find(x=>x.id===ci); if(c){c.items=c.items.filter(i=>i.id!==ii);save();render();} return; }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function setPage(id){
  document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));
  const pg=document.getElementById("pg-"+id);
  if(pg) pg.classList.add("on");
}

function render(){
  // Nav
  const mgrTabs=[{id:"dashboard",l:"Home"},{id:"inspect",l:"Fleet"},{id:"inventory",l:"Inventory"},{id:"orders",l:"Orders"},{id:"checkout",l:"Checkout"},{id:"settings",l:"Settings"}];
  const techTabs=[{id:"checkout",l:"Request"}];
  const tabs=S.role==="manager"?mgrTabs:techTabs;
  const pending=S.orders.filter(o=>o.status==="Pending").length;
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${S.tab===t.id?" on":""}" data-a="tab" data-v="${t.id}">${t.l}${t.id==="orders"&&pending>0?'<span class="bdg">'+pending+'</span>':""}</button>`).join("");
  setPage(S.tab);
  if(S.tab==="dashboard") renderDash();
  else if(S.tab==="inspect") renderInspect();
  else if(S.tab==="inventory") renderInv();
  else if(S.tab==="orders") renderOrders();
  else if(S.tab==="checkout") renderCheckout();
  else if(S.tab==="settings") renderSettings();
}

  const low=products.filter(p=>p.qty<=p.lowAt);
  const pend=orders.filter(o=>o.status==="Pending").length;

  document.getElementById("pg-dashboard").innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div><h1 style="font-size:20px;font-weight:700;">Admin Hub</h1><p style="color:#475569;font-size:13px;margin-top:2px;">Willamette Valley Branch</p></div>
    </div>
    ${pend>0?`<div class="al-a" data-a="tab" data-v="orders"><span style="color:#f59e0b;font-size:18px;">!</span><div><div style="color:#f59e0b;font-weight:600;font-size:14px;">${pend} pending request${pend>1?"s":""}</div><div style="color:#78350f;font-size:12px;">Tap to review</div></div></div>`:""}
    ${low.length>0?`<div class="al-o" data-a="tab" data-v="inventory"><span style="color:#fb923c;font-size:18px;">!</span><div><div style="color:#fb923c;font-weight:600;">Low Stock Alert</div><div style="color:#9a3412;font-size:12px;">${low.map(p=>esc(p.name)).join(", ")}</div></div></div>`:""}
    <div class="g2" style="margin-bottom:20px;">
      <div class="sc"><div style="font-size:24px;font-weight:700;color:#3b82f6;">${mo}</div><div style="font-size:11px;color:#475569;margin-top:4px;">Inspections This Month</div></div>
      <div class="sc"><div style="font-size:24px;font-weight:700;color:${avg?sc(avg):"#475569"};">${inspections.length?avg+"%":"N/A"}</div><div style="font-size:11px;color:#475569;margin-top:4px;">Avg Score</div></div>
      <div class="sc"><div style="font-size:24px;font-weight:700;color:#8b5cf6;">${tot.toLocaleString()}</div><div style="font-size:11px;color:#475569;margin-top:4px;">Total Inventory</div></div>
      <div class="sc"><div style="font-size:24px;font-weight:700;color:${low.length>0?"#f97316":"#22c55e"};">${low.length}</div><div style="font-size:11px;color:#475569;margin-top:4px;">Low Stock Items</div></div>
      <div class="sc"><div style="font-size:24px;font-weight:700;color:${pend>0?"#f59e0b":"#22c55e"};">${pend}</div><div style="font-size:11px;color:#475569;margin-top:4px;">Pending Requests</div></div>
    </div>
    <div class="g2" style="margin-bottom:20px;">
      <button class="btn bp" style="padding:16px;border-radius:12px;" data-a="tab" data-v="inspect">Fleet Inspect</button>
      <button class="btn bs" style="padding:16px;border-radius:12px;" data-a="tab" data-v="inventory">Inventory</button>
    </div>
    ${inspections.length>0?`<div style="font-size:12px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600;">Recent Inspections</div>${inspections.slice(0,3).map(r=>`<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;" data-a="insp-detail" data-v="${r.id}">${ring(r.pct,48)}<div style="flex:1"><div style="font-weight:600;font-size:14px;">${esc(r.truck)}</div><div style="color:#475569;font-size:12px;">${fd(r.date)}${r.inspector?" - "+esc(r.inspector):""}</div></div><span class="sbdg" style="background:${sc(r.pct)}22;color:${sc(r.pct)}">${sl(r.pct)}</span></div>`).join("")}`:""}`;

// ─── Inspections ──────────────────────────────────────────────────────────────
function renderInspect(){
  const pg=document.getElementById("pg-inspect");
  if(S.inspView==="home") pg.innerHTML=inspHome();
  else if(S.inspView==="list") pg.innerHTML=inspList();
  else if(S.inspView==="form") pg.innerHTML=inspForm();
  else if(S.inspView==="detail") pg.innerHTML=inspDetail();
}

      <div style="font-size:36px;margin-bottom:12px;">&#x1F69A;</div>

function inspList(){
  const filter=S.inspListFilter||"all";
  const trucks=[...new Set(S.inspections.map(i=>i.truck))];
  const filtered=filter==="all"?S.inspections:S.inspections.filter(i=>i.truck===filter);
  return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;">
    <button class="btn bg" data-a="insp-view" data-v="home">Back</button>
    <h2 style="font-size:18px;font-weight:700;">Inspection Records</h2>
  </div>
  <select class="inp" style="margin-bottom:14px;" id="insp-filter">
    <option value="all">All Trucks</option>${trucks.map(t=>`<option value="${esc(t)}"${filter===t?" selected":""}>${esc(t)}</option>`).join("")}
  </select>
  ${filtered.length===0?`<div style="text-align:center;color:#475569;padding:40px;">No records found.</div>`:
    filtered.map(r=>`<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;" data-a="insp-detail" data-v="${r.id}">${ring(r.pct,52)}<div style="flex:1"><div style="font-weight:600;font-size:15px;">${esc(r.truck)}</div><div style="color:#475569;font-size:12px;">${fd(r.date)}${r.inspector?" - "+esc(r.inspector):""}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;"><span class="sbdg" style="background:${sc(r.pct)}22;color:${sc(r.pct)}">${sl(r.pct)}</span><button class="btn bd" style="font-size:11px;padding:3px 8px;" data-a="insp-del" data-v="${r.id}">Delete</button></div></div>`).join("")}`;
}

function inspForm(){
  const {cats,inspData}=S;
  const steps=["Info",...cats.map(c=>c.label),"Photos & Submit"];
  const step=S.inspStep;
  const isInfo=step===0,isPhotos=step===steps.length-1;
  const cat=!isInfo&&!isPhotos?cats[step-1]:null;
  let pct=calcPct();
  const prog=`<div class="pb"><div class="pf" style="width:${(step/(steps.length-1))*100}%"></div></div><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span style="font-size:12px;color:#475569;">Step ${step+1} of ${steps.length}</span><span style="font-size:12px;color:#475569;">${esc(steps[step])}</span></div>`;
  let body="";
  if(isInfo){
    body=`<h2 style="font-size:17px;font-weight:700;margin-bottom:18px;">Inspection Details</h2>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Vehicle</label>
        <select class="inp" id="insp-truck">${S.trucks.map(t=>`<option value="${esc(t)}"${inspData.truck===t?" selected":""}>${esc(t)}</option>`).join("")}</select></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Current Mileage</label>
        <input type="number" class="inp" id="insp-mileage" value="${esc(inspData.mileage)}" placeholder="e.g. 87432"></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Inspector Name</label>
        <input type="text" class="inp" id="insp-inspector" value="${esc(inspData.inspector)}" placeholder="Your name"></div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Notes</label>
        <textarea class="inp" rows="3" id="insp-notes" placeholder="Overall observations...">${esc(inspData.notes)}</textarea></div>`;
  } else if(cat){
    const items=cat.items.map(item=>{
      const key=cat.id+":"+item.id;
      const val=inspData.scores[key];
      const btns=Array.from({length:cat.scale},(_,i)=>i+1).map(n=>`<button class="skb${val===n?" on":""}" style="${val===n?"background:"+sc((n/cat.scale)*100)+";border-color:"+sc((n/cat.scale)*100)+";":""}" data-a="score" data-v="${cat.id}|${item.id}|${n}">${n}</button>`).join("");
      const comment=item.hc?`<input type="text" class="inp" style="margin-top:8px;font-size:13px;padding:7px 10px;" placeholder="Comment (optional)" value="${esc(inspData.comments[key]||"")}" data-commentkey="${key}">`:"";
      return `<div style="background:#0a1628;border-radius:9px;padding:14px;border:1px solid #1e3a5f;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-weight:500;font-size:14px;">${esc(item.label)}</span>
          <span style="font-family:monospace;font-size:15px;font-weight:700;color:${val===undefined?"#334155":sc((val/cat.scale)*100)}">${val===undefined?"--":val+"/"+cat.scale}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${btns}</div>${comment}</div>`;
    }).join("");
    body=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;"><h2 style="font-size:17px;font-weight:700;">${esc(cat.label)}</h2><span style="background:#0d1f3c;color:#93c5fd;padding:3px 10px;border-radius:6px;font-size:12px;">Out of ${cat.scale}</span></div><div style="display:flex;flex-direction:column;gap:14px;">${items}</div>`;
  } else {
    const photos=(inspData.photos||[]).map((ph,i)=>`<div style="position:relative;"><img src="${ph.data}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;"><button style="position:absolute;top:3px;right:3px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;" data-a="del-photo" data-v="${i}">x</button></div>`).join("");
    body=`<h2 style="font-size:17px;font-weight:700;margin-bottom:6px;">Photos & Submit</h2>
      <p style="color:#475569;font-size:13px;margin-bottom:16px;">Review your score and save.</p>
      <div style="background:#0a1628;border-radius:10px;padding:16px;margin-bottom:16px;text-align:center;border:2px solid ${sc(pct)}30;">${ring(pct,90)}<div style="margin-top:6px;font-size:18px;font-weight:700;color:${sc(pct)}">${sl(pct)}</div><div style="color:#475569;font-size:12px;margin-top:2px;">${esc(inspData.truck)}</div></div>
      <input type="file" id="photo-file" accept="image/*" multiple style="display:none">
      <button class="btn bg" style="width:100%;padding:12px;margin-bottom:12px;" data-a="add-photo">Add Photos</button>

  return `${prog}<div class="card" style="margin-bottom:14px;">${body}</div><div style="display:flex;gap:10px;">${back}${fwd}</div>`;
}

function inspDetail(){
  const r=S.detailInsp;
  if(!r) return "";
  const cats=S.cats.map(cat=>{
    const scored=cat.items.filter(i=>r.scores[cat.id+":"+i.id]!==undefined);
    if(!scored.length) return "";
    const e=scored.reduce((a,i)=>a+(r.scores[cat.id+":"+i.id]||0),0);
    const cp=Math.round((e/(cat.items.length*cat.scale))*100);
    return `<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;"><div style="padding:10px 14px;background:#0a1628;display:flex;justify-content:space-between;"><span style="font-weight:600;font-size:14px;">${esc(cat.label)}</span><span style="font-family:monospace;font-size:13px;font-weight:700;color:${sc(cp)}">${cp}%</span></div><div style="padding:14px;">${cat.items.map(item=>{const s=r.scores[cat.id+":"+item.id];const cm=r.comments?.[cat.id+":"+item.id];return `<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;"><div><div style="font-size:13px;">${esc(item.label)}</div>${cm?`<div style="font-size:11px;color:#64748b;">"${esc(cm)}"</div>`:""}</div><span style="font-family:monospace;font-size:13px;font-weight:700;white-space:nowrap;color:${s===undefined?"#334155":sc((s/cat.scale)*100)}">${s===undefined?"--":s+"/"+cat.scale}</span></div>`;}).join("")}</div></div>`;
  }).join("");
  const photos=r.photos?.length?`<div class="card" style="margin-top:8px;"><div style="font-size:11px;color:#475569;text-transform:uppercase;margin-bottom:10px;">Photos (${r.photos.length})</div><div class="g3">${r.photos.map(ph=>`<img src="${ph.data}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;">`).join("")}</div></div>`:"";
  return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;"><button class="btn bg" data-a="insp-view" data-v="list">Back</button><button class="btn bd" data-a="insp-del" data-v="${r.id}">Delete</button></div>
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:20px;">${ring(r.pct,72)}<div><h2 style="font-size:20px;font-weight:700;">${esc(r.truck)}</h2><div style="color:#475569;font-size:13px;margin-top:3px;">${fd(r.date)}${r.inspector?" - "+esc(r.inspector):""}</div>${r.mileage?`<div style="color:#64748b;font-size:12px;margin-top:2px;">${Number(r.mileage).toLocaleString()} miles</div>`:""}</div></div>
    ${r.notes?`<div class="card" style="margin-bottom:12px;"><div style="font-size:11px;color:#475569;text-transform:uppercase;margin-bottom:5px;">Notes</div><p style="font-size:13px;color:#cbd5e1;">${esc(r.notes)}</p></div>`:""}
    ${cats}${photos}`;
}

function calcPct(){
  let e=0,p=0;
  S.cats.forEach(c=>c.items.forEach(item=>{p+=c.scale;const s=S.inspData.scores[c.id+":"+item.id];if(s!==undefined)e+=s;}));
  return p>0?Math.round((e/p)*100):0;
}

async function saveInsp(){
  const pct=calcPct();
  const rec={id:uid(),date:new Date().toISOString(),...S.inspData,pct};
  S.inspections.unshift(rec);
  S.inspView="home"; save(); render();
  const catH=S.cats.flatMap(c=>c.items.map(i=>c.label+": "+i.label+" (/"+c.scale+")"));
  const headers=["Date","Truck","Inspector","Mileage","Overall %",...catH];
  const catS=S.cats.flatMap(c=>c.items.map(item=>{const s=S.inspData.scores[c.id+":"+item.id];return s!==undefined?s:"";}));
  const row=[new Date(rec.date).toLocaleDateString("en-US"),rec.truck,rec.inspector||"",rec.mileage||"",pct,...catS];
  try { await gs("logInspectionServer",{headers,row}); } catch(e){}
}

async function doRestock(id){
  const amt=parseInt(document.getElementById("rst-"+id)?.value);
  if(!amt||amt<=0){alert("Enter a valid amount.");return;}
  const reason=document.getElementById("rst-reason-"+id)?.value||"Restock received";
  const p=S.products.find(x=>x.id===id); if(!p) return;
  const old=p.qty; p.qty+=amt; S._restockId=null; save(); render();
  try { await gs("updateQtyServer",{row:p.row,qty:p.qty}); await gs("logAdjustmentServer",{product:p.name,unit:p.unit,oldQty:old,newQty:p.qty,manager:S.managerName,reason}); } catch(e){}
}

async function doAdj(id){
  const val=parseInt(document.getElementById("adj-"+id)?.value);
  if(isNaN(val)){alert("Enter a valid quantity.");return;}
  const reason=document.getElementById("adj-reason-"+id)?.value||"Manual adjustment";
  const p=S.products.find(x=>x.id===id); if(!p) return;
  const old=p.qty; p.qty=Math.max(0,val); S._adjId=null; save(); render();
  try { await gs("updateQtyServer",{row:p.row,qty:p.qty}); await gs("logAdjustmentServer",{product:p.name,unit:p.unit,oldQty:old,newQty:p.qty,manager:S.managerName,reason}); } catch(e){}
}

    const prod=S.products.find(p=>p.id===item.productId);

function checkDone(){
  const isM=S.role==="manager";
  return `<div style="text-align:center;padding:40px 20px;">
    <div style="width:72px;height:72px;background:#14532d;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;">&#x2713;</div>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">${isM?"Checkout Complete":"Request Submitted"}</h2>
    <p style="color:#475569;font-size:14px;margin-bottom:28px;">${isM?"Products logged and inventory updated.":"Your request has been sent to management."}</p>
    <button class="btn bp" data-a="checkout-reset">New ${isM?"Checkout":"Request"}</button></div>`;
}

async function submitCheckout(){
  const techSel=document.getElementById("check-tech");
  const tech=techSel?techSel.value:S.checkTech;
  if(!tech){alert("Please select your name.");return;}
  S.checkTech=tech;
  const valid=S.checkItems.filter(i=>i.productId&&parseInt(i.qty)>0);
  if(!valid.length){alert("Please add at least one product with a quantity.");return;}
  const isM=S.role==="manager";
  for(const item of valid){
    const prod=S.products.find(p=>p.id===item.productId); if(!prod) continue;
    const te=S.techEmails.find(t=>t.name===tech);
    if(isM){
      const newQty=Math.max(0,prod.qty-parseInt(item.qty));
      prod.qty=newQty;
      const rec={id:uid(),date:new Date().toISOString(),tech,techEmail:te?.email||"",product:prod.name,qty:parseInt(item.qty),unit:prod.unit,notes:item.notes||""};
      S.checkouts.unshift(rec);
      try { await gs("updateQtyServer",{row:prod.row,qty:newQty}); await gs("logCheckoutServer",rec); } catch(e){}
      const low=S.products.filter(p=>p.qty<=p.lowAt);
      if(low.length) sendLowEmail(low);
    } else {
      const order={id:"ORD-"+Date.now(),date:new Date().toISOString(),tech,techEmail:te?.email||"",product:prod.name,productId:prod.id,requestedQty:parseInt(item.qty),unit:prod.unit,notes:item.notes||"",status:"Pending"};
      S.orders.unshift(order);
      try { await gs("addPendingOrderServer",order); await gs("sendEmailServer",{to:MGMT.join(","),subject:"[Fox Pest Control] Product Request - "+order.tech+" - "+order.product,body:"Product Request\n\nTechnician: "+order.tech+"\nProduct: "+order.product+"\nQty: "+order.requestedQty+" "+order.unit+(order.notes?"\nNotes: "+order.notes:"")+"\n\nLog in to Admin Hub to approve or deny.\nOrder ID: "+order.id}); } catch(e){}
    }
  }
  save(); S.checkDone=true; render();
}

// ─── Orders ───────────────────────────────────────────────────────────────────
function renderOrders(){
  const {orders,products}=S;
  const filter=S.ordersFilter;
  const filtered=filter==="All"?orders:orders.filter(o=>o.status===filter);
  const pend=orders.filter(o=>o.status==="Pending").length;
  function osc(st){return st==="Pending"?"#f59e0b":st==="Approved"?"#22c55e":"#ef4444";}
  const fbtns=["Pending","Approved","Denied","All"].map(f=>`<button class="fb${filter===f?" on":""}" data-a="order-filter" data-v="${f}">${f}${f==="Pending"&&pend>0?" ("+pend+")":""}</button>`).join("");
  const cards=filtered.map(order=>{
    const prod=products.find(p=>p.id===order.productId);
    const isAct=S.editOrderId===order.id;
    let panel="";
    if(order.status==="Pending"&&!isAct) panel=`<div style="display:flex;gap:8px;padding-top:10px;border-top:1px solid #1e3a5f;"><button class="btn bs" style="flex:1;padding:8px;font-size:13px;" data-a="order-action" data-v="${order.id}|approve">Approve</button><button class="btn bd" style="flex:1;padding:8px;font-size:13px;" data-a="order-action" data-v="${order.id}|deny">Deny</button></div>`;
    else if(isAct&&S.editOrderType==="approve") panel=`<div style="padding-top:10px;border-top:1px solid #1e3a5f;"><div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">Adjust qty if needed:</div><div style="display:flex;gap:8px;margin-bottom:8px;"><input type="number" class="inp" id="app-qty-${order.id}" value="${order.requestedQty}" style="flex:1;padding:7px;font-size:14px;font-weight:700;"><span style="display:flex;align-items:center;color:#64748b;font-size:13px;">${esc(order.unit)}</span></div>${prod&&order.requestedQty>prod.qty?`<div style="color:#f97316;font-size:12px;margin-bottom:8px;">Only ${prod.qty} in stock</div>`:""}<div style="display:flex;gap:8px;"><button class="btn bs" style="flex:2;padding:9px;font-size:13px;" data-a="approve-order" data-v="${order.id}">Confirm Approval</button><button class="btn bg" style="flex:1;padding:9px;font-size:13px;" data-a="order-action-cancel">Cancel</button></div></div>`;
    else if(isAct&&S.editOrderType==="deny") panel=`<div style="padding-top:10px;border-top:1px solid #1e3a5f;"><input type="text" class="inp" id="deny-rsn-${order.id}" style="margin-bottom:8px;padding:7px 10px;font-size:13px;" placeholder="Reason (optional)"><div style="display:flex;gap:8px;"><button class="btn bd" style="flex:2;padding:9px;font-size:13px;" data-a="deny-order" data-v="${order.id}">Confirm Denial</button><button class="btn bg" style="flex:1;padding:9px;font-size:13px;" data-a="order-action-cancel">Cancel</button></div></div>`;
    return `<div class="card" style="margin-bottom:10px;${order.status==="Pending"?"border-color:#92400e30":""}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
        <div><div style="font-weight:700;font-size:15px;">${esc(order.product)}</div><div style="color:#64748b;font-size:12px;margin-top:2px;">${esc(order.tech)} - ${fd(order.date)}</div><div style="color:#94a3b8;font-size:12px;margin-top:1px;">Requested: ${order.requestedQty} ${esc(order.unit)}${prod?` <span style="color:#475569;">- ${prod.qty} in stock</span>`:""}</div>${order.notes?`<div style="color:#64748b;font-size:12px;margin-top:3px;font-style:italic;">"${esc(order.notes)}"</div>`:""}${order.status==="Approved"?`<div style="color:#22c55e;font-size:12px;margin-top:3px;">Approved: ${order.approvedQty} by ${esc(order.approvedBy)}</div>`:""}${order.status==="Denied"?`<div style="color:#ef4444;font-size:12px;margin-top:3px;">Denied by ${esc(order.approvedBy)}${order.denyReason?" - "+esc(order.denyReason):""}</div>`:""}</div>
        <span class="sbdg" style="background:${osc(order.status)}22;color:${osc(order.status)};white-space:nowrap;">${order.status}</span>
      </div>${panel}</div>`;
  }).join("");
  document.getElementById("pg-orders").innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><div><h2 style="font-size:20px;font-weight:700;">Product Orders</h2>${pend>0?`<p style="color:#f59e0b;font-size:13px;margin-top:2px;">${pend} pending approval</p>`:""}</div></div><div style="display:flex;gap:6px;margin-bottom:16px;">${fbtns}</div>${filtered.length===0?`<div style="text-align:center;color:#475569;padding:40px;">No ${filter.toLowerCase()} orders.</div>`:cards}`;
}

async function confirmApprove(orderId){
  const qty=parseInt(document.getElementById("app-qty-"+orderId)?.value);
  if(!qty||qty<=0){alert("Enter a valid quantity.");return;}
  const order=S.orders.find(o=>o.id===orderId); if(!order) return;
  const prod=S.products.find(p=>p.id===order.productId);
  if(prod){const nq=Math.max(0,prod.qty-qty);prod.qty=nq;try{await gs("updateQtyServer",{row:prod.row,qty:nq});}catch(e){}}
  order.status="Approved"; order.approvedQty=qty; order.approvedBy=S.managerName;
  S.editOrderId=null; save(); render();
  const te=[order.techEmail,...MGMT].filter(Boolean).join(",");
  try { await gs("updateOrderStatusServer",{orderId,status:"Approved",approvedQty:qty,approvedBy:S.managerName}); await gs("addOrderHistoryServer",{...order,approvedQty:qty,approvedBy:S.managerName}); await gs("sendEmailServer",{to:te,subject:"[Fox Pest Control] Order Approved - "+order.product,body:"Your product request has been APPROVED\n\nTechnician: "+order.tech+"\nProduct: "+order.product+"\nApproved Qty: "+qty+" "+order.unit+"\nApproved By: "+S.managerName+"\n\nItems will be ready for pickup.\n\nAutomated notification from Fox Admin Hub."}); } catch(e){}
  const low=S.products.filter(p=>p.qty<=p.lowAt);
  if(low.length) sendLowEmail(low);
}

async function confirmDeny(orderId){
  const reason=document.getElementById("deny-rsn-"+orderId)?.value||"";
  const order=S.orders.find(o=>o.id===orderId); if(!order) return;
  order.status="Denied"; order.approvedBy=S.managerName; order.denyReason=reason;
  S.editOrderId=null; save(); render();
  const te=[order.techEmail,...MGMT].filter(Boolean).join(",");
  try { await gs("updateOrderStatusServer",{orderId,status:"Denied",approvedQty:0,approvedBy:S.managerName}); await gs("sendEmailServer",{to:te,subject:"[Fox Pest Control] Order Denied - "+order.product,body:"Your product request has been DENIED\n\nTechnician: "+order.tech+"\nProduct: "+order.product+"\nDenied By: "+S.managerName+(reason?"\nReason: "+reason:"")+"\n\nContact your manager with questions.\n\nAutomated notification from Fox Admin Hub."}); } catch(e){}
}

async function sendLowEmail(low){
  const list=low.map(p=>"  - "+p.name+": "+p.qty+" "+p.unit+" (min: "+p.lowAt+")").join("\n");
  try { await gs("sendEmailServer",{to:MGMT.join(","),subject:"[Fox Pest Control] Low Stock Alert - "+low.length+" item"+(low.length>1?"s":"")+" need restocking",body:"Low Stock Alert - Willamette Valley\n\n"+list+"\n\nPlease restock soon.\n\nAutomated notification."}); } catch(e){}
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function renderSettings(){
  const tab=S.settingsTab;
  const tabs=[{id:"access",l:"Access"},{id:"trucks",l:"Trucks"},{id:"techs",l:"Technicians"},{id:"cats",l:"Inspection"},{id:"prods",l:"Products"},{id:"me",l:"My Name"}];
  const tbns=tabs.map(t=>`<button class="stb${tab===t.id?" on":""}" data-a="settings-tab" data-v="${t.id}">${t.l}</button>`).join(" ");
  let body="";
  if(tab==="access") body=`<p style="color:#475569;font-size:13px;margin-bottom:16px;">Set PIN codes for manager and technician access.</p><div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Manager PIN</label><input type="password" class="inp" id="pin-mgr-inp" value="${S.pins.manager}" maxlength="8" placeholder="4-8 digits"></div><div style="margin-bottom:14px;"><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Technician PIN</label><input type="password" class="inp" id="pin-tech-inp" value="${S.pins.tech}" maxlength="8" placeholder="4-8 digits"></div><button class="btn bp" data-a="save-pins">Save PINs</button>`;
  else if(tab==="trucks") body=`<div style="display:flex;gap:8px;margin-bottom:14px;"><input type="text" class="inp" id="new-truck-inp" placeholder="e.g. Truck 10" style="flex:1;"><button class="btn bp" style="padding:10px 14px;font-size:13px;" data-a="add-truck">Add</button></div>${S.trucks.map((t,i)=>`<div class="card" style="display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:10px 14px;"><span style="flex:1;font-size:14px;font-weight:500;">${esc(t)}</span><button class="btn bd" style="padding:5px 9px;font-size:12px;" data-a="del-truck" data-v="${i}">X</button></div>`).join("")}`;
  else if(tab==="techs") body=`<div style="display:flex;gap:8px;margin-bottom:14px;"><input type="text" class="inp" id="new-tech-inp" placeholder="Full name" style="flex:1;"><button class="btn bp" style="padding:10px 14px;font-size:13px;" data-a="add-tech">Add</button></div>${S.techs.map((t,i)=>`<div class="card" style="display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:10px 14px;"><span style="flex:1;font-size:14px;font-weight:500;">${esc(t)}</span><button class="btn bd" style="padding:5px 9px;font-size:12px;" data-a="del-tech" data-v="${i}">X</button></div>`).join("")}`;
  else if(tab==="cats") body=renderCatSettings();
  else if(tab==="prods") body=`<p style="color:#475569;font-size:13px;margin-bottom:14px;">Edit thresholds and units.</p>${S.products.map(p=>`<div class="card" style="margin-bottom:8px;"><div style="font-weight:600;font-size:14px;margin-bottom:8px;">${esc(p.name)}</div><div class="g3"><div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">Unit</div><input class="inp" style="padding:6px 8px;font-size:13px;" value="${esc(p.unit)}" data-prodid="${p.id}" data-prodfield="unit"></div><div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">Qty</div><input type="number" class="inp" style="padding:6px 8px;font-size:13px;" value="${p.qty}" data-prodid="${p.id}" data-prodfield="qty"></div><div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">Low At</div><input type="number" class="inp" style="padding:6px 8px;font-size:13px;" value="${p.lowAt}" data-prodid="${p.id}" data-prodfield="lowAt"></div></div></div>`).join("")}`;
  else if(tab==="me") body=`<p style="color:#475569;font-size:13px;margin-bottom:14px;">Your name appears in logs and approvals.</p><label style="display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Your Name</label><input type="text" class="inp" id="mgr-name-inp" value="${esc(S.managerName)}" placeholder="Enter your name"><button class="btn bp" style="margin-top:12px;" data-a="save-mgr-name">Save</button>`;
  document.getElementById("pg-settings").innerHTML=`<h2 style="font-size:20px;font-weight:700;margin-bottom:14px;">Settings</h2><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;">${tbns}</div>${body}`;
}

function renderCatSettings(){
  const open=S.openCat;
  const rows=S.cats.map(cat=>`<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden;"><div style="padding:12px 14px;background:#0a1628;display:flex;align-items:center;gap:8px;cursor:pointer;" data-a="toggle-cat" data-v="${cat.id}"><div style="flex:1;"><span style="font-weight:600;font-size:14px;">${esc(cat.label)}</span><span style="font-size:11px;color:#475569;margin-left:8px;">1-${cat.scale} - ${cat.items.length} items</span></div><span style="color:#64748b;">${open===cat.id?"&#x25B2;":"&#x25BC;"}</span></div>${open===cat.id?`<div style="padding:14px;"><div style="display:flex;gap:8px;margin-bottom:12px;"><input class="inp" style="flex:1;padding:6px 10px;font-size:13px;" value="${esc(cat.label)}" data-catid="${cat.id}" data-catfield="label"><select class="inp" style="width:80px;padding:6px 8px;font-size:13px;" data-catid="${cat.id}" data-catfield="scale">${[3,5,10].map(n=>`<option value="${n}"${cat.scale===n?" selected":""}>1-${n}</option>`).join("")}</select></div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${cat.items.map(item=>`<div style="display:flex;gap:6px;align-items:center;background:#0a1628;border-radius:7px;padding:7px 10px;border:1px solid #1e3a5f;"><input class="inp" style="flex:1;padding:4px 8px;font-size:12px;background:transparent;border:none;" value="${esc(item.label)}" data-catid="${cat.id}" data-itemid="${item.id}"><button style="background:transparent;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:0 2px;" data-a="del-cat-item" data-v="${cat.id}|${item.id}">x</button></div>`).join("")}</div><div style="display:flex;gap:8px;"><button class="btn bg" style="flex:1;font-size:12px;padding:7px;" data-a="add-cat-item" data-v="${cat.id}">+ Add Item</button><button class="btn bd" style="font-size:12px;padding:7px 12px;" data-a="del-cat" data-v="${cat.id}">Remove</button></div></div>`:""}
  </div>`).join("");
  return `<button class="btn bp" style="width:100%;margin-bottom:14px;font-size:13px;" data-a="add-cat">+ Add Category</button>${rows}`;
}

function savePins(){
  const m=(document.getElementById("pin-mgr-inp")?.value||"").replace(/[^0-9]/g,"");
  const t=(document.getElementById("pin-tech-inp")?.value||"").replace(/[^0-9]/g,"");
  if(m.length<4||t.length<4){alert("PINs must be at least 4 digits.");return;}
  S.pins={manager:m,tech:t}; save(); alert("PINs saved!");
}

document.addEventListener("change",function(e){
  if(e.target.id==="photo-file"){
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>{S.inspData.photos=S.inspData.photos||[];S.inspData.photos.push({id:uid(),name:f.name,data:ev.target.result});render();};
      r.readAsDataURL(f);
    });
  }
});

// Global click handler
document.body.onclick = function(e){
  var t = e.target;
  while(t && t !== document.body){
    if(t.getAttribute && t.getAttribute("data-a")){
      handleAction(t.getAttribute("data-a"), t.getAttribute("data-v")||"", t, e);
      return;
    }
    t = t.parentElement;
  }
};
